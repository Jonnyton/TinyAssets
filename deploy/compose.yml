# TinyAssets daemon — Docker Compose for self-host deploys.
#
# Self-host migration Row D per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Platform services:
#   daemon      — the MCP server image (Row A Dockerfile, published to
#                 GHCR by Row I build-image.yml). Binds 127.0.0.1:8001.
#                 Reads on-disk state from a named volume mounted at
#                 /data, env-var driven per Row B data_dir() resolver.
#   cloudflared — tunnel sidecar exposing daemon at mcp.tinyassets.io
#                 (tunnel origin). Token read from env. Runs the
#                 official cloudflared image + the same run-tunnel.sh
#                 entrypoint used locally (Row C).
#
# The daemon does NOT publish 8001 to the host network; cloudflared
# reaches it via Docker's default bridge at daemon:8001. Only the
# loopback is exposed for host-side canary probes.
#
# Secrets: sourced from /etc/tinyassets/env (the env_file below). Host
# provisions that file with chmod 600 per HETZNER-DEPLOY.md. Never
# commit real values to this repo.
#
# Dev use:
#   # Render this compose against a local env file for smoke tests.
#   cp deploy/tinyassets-env.template /tmp/tinyassets-env
#   # ...fill in real values...
#   docker compose -f deploy/compose.yml --env-file /tmp/tinyassets-env up

services:
  daemon:
    # Required immutable image reference. Production writes a digest ref
    # resolved from the short-SHA tag emitted by build-image.yml.
    image: ${TINYASSETS_IMAGE:?Set TINYASSETS_IMAGE to an immutable ghcr.io/jonnyton/tinyassets-daemon@sha256:<digest> ref}
    container_name: tinyassets-daemon
    restart: unless-stopped
    # Root exists only at the entrypoint custody boundary: preload 0400 KEKs,
    # initialize /vault-guard, then drop permanently to UID/GID 1001.
    user: "0:0"
    # Image CMD already runs `python -m tinyassets.universe_server`.
    # Expose loopback only; cloudflared reaches via Docker network.
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      HOME: /app
      TINYASSETS_DATA_DIR: /data
      TINYASSETS_CONTROL_PLANE: "1"
      # Credential-vault anti-rollback guard: MUST live on a persistent
      # NON-/data volume. Under /data a restore would carry the guard along
      # with the vault (defeating rollback detection); on the ephemeral
      # container home every rebuild would look like a rollback and force a
      # full re-authorization of every stored credential.
      TINYASSETS_VAULT_ROLLBACK_GUARD: /vault-guard
      # Platform-vault KEKs: root-only host dir OUTSIDE /data (bind-mounted
      # ro below) so a stolen data volume/backup cannot decrypt the vault.
      TINYASSETS_VAULT_KEK_DIR: /vault-keys
      TINYASSETS_REPO_ROOT: /data/community-pool
      # Fleet activation only. Goal-pool/marketplace economy stays dark
      # until the PR-177 follow-on intentionally unstubs it.
      TINYASSETS_GOAL_POOL: "off"
      # Coding-lane eval gates (S2 output-rubric + S3 trajectory) — ENFORCE.
      # Host-approved flip 2026-06-25: the auto-ship MCP action
      # (validate_ship_packet) now BLOCKS on a conclusive rubric/trajectory FAIL
      # instead of warn-only. Both default `warn` in code; set here to make
      # enforce the deployed default. NOT exercised by the autonomous loop — only
      # by explicit ship-validation calls — so the flip cannot wedge the loop.
      # Rollback: set to "warn" (or revert this line) + recreate the daemon.
      TINYASSETS_AUTO_SHIP_RUBRIC_MODE: "enforce"
      TINYASSETS_AUTO_SHIP_TRAJECTORY_MODE: "enforce"
      # Coding-node OS-sandbox attestation (patch-loop S3): TINYASSETS_OS_SANDBOX_ATTESTED
      # is DELIBERATELY OMITTED. Sandbox-required coding nodes (draft_patch etc.)
      # fail closed at run time (enforce_os_sandbox in providers/base.py) until a
      # host provides real per-job OS isolation — this container does NOT, so
      # coding nodes are refused BY DESIGN (design-only branches unaffected). It
      # may ONLY be set "1" by a per-job runner providing ALL of: (a) a prepared
      # per-job repo checkout, (b) tenant/host path invisibility, (c) restricted
      # egress, (d) resource limits, (e) scoped credential brokering (owner-only
      # auth, never platform-global). Setting it without all five re-opens the
      # exfiltration vector the gate closes. See deploy/docker-entrypoint.sh.
      # Pass through anything in the env file.
      TINYASSETS_MCP_CANARY_URL: ${TINYASSETS_MCP_CANARY_URL:-https://tinyassets.io/mcp}
    env_file:
      - /etc/tinyassets/env
    volumes:
      - tinyassets-data:/data
      # Persistent NON-/data guard volume (anti-rollback epoch). Backups
      # deliberately do NOT snapshot it; backup-restore.sh bumps it via
      # scripts/vault_restore_bump.py after every restore.
      - tinyassets-vault-guard:/vault-guard
      # Root-only KEK dir on the host (outside /data + outside backups).
      # Provision: 32-byte k1.bin (mode 0400 root) + `active` file naming it.
      - /etc/tinyassets/vault-keys:/vault-keys:ro
    healthcheck:
      # Use the same canary shape as Layer-1 / tier-3 / docker-build
      # CI. Python already in the image.
      test: ["CMD", "python", "/app/scripts/mcp_public_canary.py",
             "--url", "http://127.0.0.1:8001/mcp", "--timeout", "10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    labels:
      org.tinyassets.component: daemon
      org.tinyassets.role: mcp-server

  cloudflared:
    # Official image, pinned to a known-stable tag + digest. Bump by
    # hand after testing on a staging box.
    image: cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    container_name: tinyassets-tunnel
    restart: unless-stopped
    # cloudflared runs in host network namespace so that the tunnel's
    # dashboard-configured ingress rule `http://localhost:8001` resolves
    # to the daemon's loopback-published port (127.0.0.1:8001 on the
    # Droplet host). Without this, "localhost" inside the cloudflared
    # container is the container's own loopback — not the daemon.
    # Long-term cleaner fix: edit the tunnel ingress rule in Cloudflare
    # Zero Trust dashboard to point at `http://daemon:8001` (Docker
    # service name), then drop network_mode: host.
    network_mode: host
    # Tunnel token auth (shape A per Row C).
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - /etc/tinyassets/env
    depends_on:
      daemon:
        condition: service_healthy
    labels:
      org.tinyassets.component: tunnel
      org.tinyassets.role: cloudflare-ingress

  # Row K — log aggregation sidecar. Tails daemon + cloudflared stdout
  # via the Docker socket. Ships to Better Stack when
  # BETTERSTACK_SOURCE_TOKEN is set in /etc/tinyassets/env; otherwise
  # logs are captured by compose stdout (journald) only.
  #
  # vector-entrypoint.sh builds /run/vector-config/ at startup:
  #   - vector.yaml always loaded (sources + transforms + stdout)
  #   - vector-betterstack.yaml loaded only when token is non-empty
  # This prevents 401 error noise when the token is unset.
  logs:
    image: timberio/vector:0.40.0-alpine@sha256:7a81fdd62e056321055a9e4bdec4073d752ecf68f4c192e676b85001721523c2
    container_name: tinyassets-logs
    restart: unless-stopped
    env_file:
      - /etc/tinyassets/env
    entrypoint: ["/bin/sh", "/etc/vector/vector-entrypoint.sh"]
    volumes:
      - /opt/tinyassets/deploy/vector.yaml:/etc/vector/vector.yaml:ro
      - /opt/tinyassets/deploy/vector-betterstack.yaml:/etc/vector/vector-betterstack.yaml:ro
      - /opt/tinyassets/deploy/vector-entrypoint.sh:/etc/vector/vector-entrypoint.sh:ro
      # Docker socket access so vector's docker_logs source can tail
      # container stdout. Read-only — we never modify containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - daemon
    labels:
      org.tinyassets.component: logs
      org.tinyassets.role: log-forwarder

volumes:
  tinyassets-data:
    name: tinyassets-data
    # Local named volume backed by Docker's default driver. Backups
    # (Row J) snapshot this to Hetzner Storage Box.
  tinyassets-vault-guard:
    name: tinyassets-vault-guard
    # Credential-vault anti-rollback guard. An INDEPENDENT recovery domain:
    # never snapshotted with tinyassets-data and never restored — restoring
    # it alongside /data would mask vault rollbacks. Persistent across
    # container rebuilds so normal deploys do not force re-authorization.

networks:
  default:
    name: tinyassets-net
    # Default bridge; cloudflared reaches daemon via `daemon:8001`.
