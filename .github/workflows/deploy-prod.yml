name: Deploy prod

# Self-host migration Row M per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Fires after build-image.yml succeeds on main. SSH into the DigitalOcean
# Droplet, pull the freshly-published image tag, `docker compose up -d`,
# run a post-deploy canary against `tinyassets.io/mcp`, and on canary
# red, auto-rollback to the previous tag.
#
# Alarm hook: deploy failures open a GitHub issue labeled `deploy-failed`
# — distinct from the canary-triggered `p0-outage` issue shape from
# Row H. That way host can tell "deploy broke" from "daemon died
# spontaneously."
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DO_DROPLET_HOST  — Droplet public IP (e.g. 161.35.237.133)
#   DO_SSH_USER      — SSH user on the Droplet (e.g. root or deploy)
#   DO_SSH_KEY       — Private key PEM for the above user
#
# Optional subscription auth secret:
#   TINYASSETS_CODEX_AUTH_JSON_B64 - base64-encoded ~/.codex/auth.json.
#   When present, deploy syncs it into /etc/tinyassets/env without printing it
#   and forces TINYASSETS_ALLOW_API_KEY_PROVIDERS=0 for the public daemon.
#
# Optional PR-122 Phase 2 capability secret (PR-128):
#   TINYASSETS_GITHUB_PR_CAPABILITIES - JSON object mapping
#   "<owner>/<repo>" -> "<token>". Read by
#   tinyassets.effectors.github_pr at invocation time; never echoed
#   into branch-visible run state. When unset, the effector emits
#   error_kind="missing_capability" dry-run evidence on real-PR
#   attempts.

on:
  workflow_run:
    workflows: ["Build and publish image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default = current main commit short-SHA)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DO_DROPLET_HOST: ${{ secrets.DO_DROPLET_HOST }}
  DO_SSH_USER: ${{ secrets.DO_SSH_USER }}
  # Canonical post-deploy probe URL.
  CANARY_URL: https://tinyassets.io/mcp
  DIRECT_URL: https://mcp.tinyassets.io/mcp

jobs:
  deploy:
    # Don't run on failed build-image runs. Manual dispatch always allowed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_CODEX_AUTH_BUNDLE: ${{ secrets.TINYASSETS_CODEX_AUTH_JSON_B64 != '' }}
      # Claude provider auth on the droplet. CLAUDE_CODE_OAUTH_TOKEN is a
      # `claude setup-token` long-lived token Claude Code reads from the env
      # (rotation-safe, no file). When set, the deploy syncs it into
      # /etc/tinyassets/env so a fresh /data volume is not left "Not logged in"
      # (the 2026-06-25 loop-wedge root cause). Same secret the CI workers use.
      HAS_CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      # Codex-style fallback: base64 of a subscription ~/.claude/.credentials.json.
      # The entrypoint seeds it to $CLAUDE_CONFIG_DIR/.credentials.json only when
      # missing. Preferred is CLAUDE_CODE_OAUTH_TOKEN above (rotation-safe); this
      # is the file path for hosts without a setup-token.
      HAS_CLAUDE_CREDENTIALS_BUNDLE: ${{ secrets.TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 != '' }}
      # PR-128 — PR-122 Phase 2 capability map sync. When the
      # TINYASSETS_GITHUB_PR_CAPABILITIES GH Actions secret is set
      # (JSON object keyed by "<owner>/<repo>" -> "<token>"), the
      # deploy step installs it into /etc/tinyassets/env so the Phase 2
      # effector can pass its capability gate. Without this the
      # effector emits error_kind="missing_capability" and stays in
      # dry-run for real-PR attempts.
      HAS_GITHUB_PR_CAPABILITY: ${{ secrets.TINYASSETS_GITHUB_PR_CAPABILITIES != '' }}
      # Founder-identity cutover (PR #1437): WorkOS Resource Server auth is
      # enabled on deploy ONLY when WORKOS_AUTHKIT_DOMAIN is present as a GH
      # Actions secret (fail-closed — WorkOSAuthProvider.from_env() raises
      # without it, so we must never flip UNIVERSE_SERVER_AUTH=workos unless the
      # domain is set). WORKOS_MCP_RESOURCE binds tokens to this server
      # (audience, RFC 8707) and defaults to the canonical public URL; it must
      # be registered as a WorkOS Resource Indicator. WORKOS_REQUIRE_AUTH=1
      # forces OAuth on connect (each user logs in -> their own universe); set
      # repo variable WORKOS_REQUIRE_AUTH='0' for anon-read + auth-write instead.
      HAS_WORKOS_CONFIG: ${{ secrets.WORKOS_AUTHKIT_DOMAIN != '' }}
      WORKOS_AUTHKIT_DOMAIN: ${{ secrets.WORKOS_AUTHKIT_DOMAIN }}
      WORKOS_MCP_RESOURCE: ${{ vars.WORKOS_MCP_RESOURCE || 'https://tinyassets.io/mcp' }}
      WORKOS_REQUIRE_AUTH: ${{ vars.WORKOS_REQUIRE_AUTH || '1' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Derive the image tag to deploy. workflow_dispatch override wins;
      # otherwise use the build-image run's head SHA.
      #
      # Resolve the requested tag to an immutable digest before deploy.
      # Doc-only commits can skip build-image.yml, leaving no image for
      # that commit SHA; in that case fail before mutating production.
      - name: Resolve image tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ -n "${REQUESTED_IMAGE_TAG}" ]; then
            tag="${REQUESTED_IMAGE_TAG}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            full_sha="${{ github.event.workflow_run.head_sha }}"
            tag="${full_sha:0:12}"
          else
            tag="$(git rev-parse --short=12 HEAD)"
          fi
          if [[ ! "${tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "::error::refusing invalid OCI image tag"
            exit 1
          fi
          owner_lower="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lower}/tinyassets-daemon"

          echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1 || true
          if docker manifest inspect "${image}:${tag}" >/dev/null 2>&1; then
            echo "::notice::image ${image}:${tag} exists in GHCR; deploying it"
          else
            echo "::error::${image}:${tag} not found in GHCR; refusing mutable image fallback"
            exit 1
          fi

          digest="$(docker buildx imagetools inspect "${image}:${tag}" | awk '/^Digest:/ {print $2; exit}')"
          if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::refusing non-canonical immutable image digest for ${image}:${tag}"
            exit 1
          fi
          image_ref="${image}@${digest}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          {
            echo "## Image resolution"
            echo ""
            echo "- effective tag: \`${image}:${tag}\`"
            echo "- immutable ref: \`${image_ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify secrets present
        run: |
          missing=()
          [ -z "$DO_DROPLET_HOST" ] && missing+=("DO_DROPLET_HOST")
          [ -z "$DO_SSH_USER" ] && missing+=("DO_SSH_USER")
          [ -z "${{ secrets.DO_SSH_KEY }}" ] && missing+=("DO_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Configure at: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/do_deploy
          chmod 600 ~/.ssh/do_deploy
          ssh-keyscan -t ed25519,rsa "$DO_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Capture previous image tag (for rollback)
        id: prev
        env:
          TARGET_REPOSITORY: ${{ steps.tag.outputs.image }}
        run: |
          set -euo pipefail
          # This step is deliberately read-only. Capture configured and actual
          # running identities independently; a mutable env tag is not rollback
          # proof. The prior receipt is capped one byte beyond the accepted
          # 65,536-byte bound so the pure classifier can distinguish oversize.
          capture_json="$(
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash -s -- '${TARGET_REPOSITORY}'" <<'REMOTE'
          set -euo pipefail
          target_repository="$1"
          configured_image_ref="$(
            grep -E '^TINYASSETS_IMAGE=' /etc/tinyassets/env 2>/dev/null \
              | tail -1 | cut -d= -f2- || true
          )"
          image_id="$(
            docker inspect --type container --format '{{.Image}}' \
              tinyassets-daemon 2>/dev/null || true
          )"
          repo_digests_json='[]'
          if [ -n "${image_id}" ]; then
            repo_digests_json="$(
              docker image inspect "${image_id}" \
                --format '{{json .RepoDigests}}' 2>/dev/null || printf '[]'
            )"
          fi
          release_state_host_dir="$(
            docker volume inspect tinyassets-data \
              --format '{{ .Mountpoint }}' 2>/dev/null || true
          )"
          prior_receipt_b64=''
          if [ -n "${release_state_host_dir}" ] \
              && [ -f "${release_state_host_dir}/release-state.json" ]; then
            prior_receipt_b64="$(
              head -c 65537 "${release_state_host_dir}/release-state.json" \
                | base64 -w0
            )"
          fi
          export target_repository configured_image_ref repo_digests_json
          export prior_receipt_b64
          python3 - <<'PY'
          import json
          import os

          try:
              digests = json.loads(os.environ["repo_digests_json"])
          except (json.JSONDecodeError, TypeError):
              digests = []
          print(json.dumps({
              "target_repository": os.environ["target_repository"],
              "configured_image_ref": os.environ["configured_image_ref"],
              "repo_digests": digests if isinstance(digests, list) else [],
              "prior_receipt_b64": os.environ["prior_receipt_b64"],
          }, sort_keys=True, separators=(",", ":")))
          PY
          REMOTE
          )"
          CAPTURE_JSON="${capture_json}" python - "$GITHUB_OUTPUT" <<'PY'
          import json
          import os
          import re
          import sys

          canonical = re.compile(
              r"^[a-z0-9]+(?:[._-][a-z0-9]+)*(?::[0-9]+)?"
              r"(?:/[a-z0-9]+(?:[._-][a-z0-9]+)*)+"
              r"@sha256:[0-9a-f]{64}$"
          )
          captured = json.loads(os.environ["CAPTURE_JSON"])
          repository = captured["target_repository"]
          configured = captured.get("configured_image_ref", "")
          if not isinstance(configured, str) or not canonical.fullmatch(configured):
              configured = ""
          candidates = sorted({
              value for value in captured.get("repo_digests", [])
              if isinstance(value, str)
              and value.startswith(f"{repository}@sha256:")
              and canonical.fullmatch(value)
          })
          running = candidates[0] if len(candidates) == 1 else ""
          previous = configured if configured and configured == running else ""
          prior_b64 = captured.get("prior_receipt_b64", "")
          with open(sys.argv[1], "a", encoding="utf-8") as output:
              output.write(f"configured_image_ref={configured}\n")
              output.write(f"running_image_ref={running}\n")
              output.write(f"previous_configured_image_ref={configured}\n")
              output.write(f"previous_running_image_ref={running}\n")
              output.write(f"previous={previous}\n")
              output.write(f"prior_receipt_b64={prior_b64}\n")
          PY

      # INVARIANT — /etc/tinyassets/env must stay root:tinyassets 640.
      # All env mutations route through `deploy/install-tinyassets-env.sh`
      # which uses `install -m 640 -o root -g tinyassets` for an atomic
      # write. The legacy `sed -i + chown + chmod` chain (root cause of
      # the 2026-04-21 P0 outage — see RC-1 in
      # docs/audits/2026-04-25-etc-workflow-env-mode-flip.md) is gone.
      # The helper asserts post-write readability by user=tinyassets, so
      # any mode-flip class is caught at the call site, not later by
      # systemd ExecStartPre.
      #
      # BUG-002 (2026-04-19): host's Windows wiki path leaked to the
      # droplet env file, making wiki_path() resolve to /app/C:\Users\...
      # Strip explicit TINYASSETS_WIKI_PATH so the resolver falls back to
      # $TINYASSETS_DATA_DIR/wiki (=/data/wiki).
      # Also strip TINYASSETS_UNIVERSE: it is a stdio-shim override, and
      # leaving it in the cloud env can bind tinyassets-worker to a
      # different universe than the public MCP default.
      # Hard rename cutover: /etc/tinyassets/env may have been bootstrapped
      # from /etc/workflow/env on first deploy. Strip every legacy
      # WORKFLOW_* override and workflow-named backup/log target so the
      # container environment no longer exposes retired product surfaces.
      # BACKUP_DEST is canonical host-owned backup configuration and must
      # survive application deploys.
      - name: Scrub stale cloud env overrides
        id: production_mutation
        run: |
          echo "production_mutation_started=true" >> "$GITHUB_OUTPUT"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo bash -s -- delete TINYASSETS_WIKI_PATH TINYASSETS_UNIVERSE WORKFLOW_IMAGE WORKFLOW_DATA_DIR WORKFLOW_MCP_CANARY_URL WORKFLOW_ALLOW_API_KEY_PROVIDERS WORKFLOW_NODE_ENQUEUE_ENABLED WORKFLOW_SOUL_LOOP_DISPATCH WORKFLOW_BUG_INVESTIGATION_BACKFILL WORKFLOW_BUG_INVESTIGATION_BRANCH_DEF_ID WORKFLOW_BUG_INVESTIGATION_GOAL_ID WORKFLOW_CODEX_AUTH_JSON_B64 WORKFLOW_CLAUDE_CREDENTIALS_JSON_B64 WORKFLOW_GITHUB_PR_CAPABILITIES BACKUP_GH_REPO LOG_DEST" \
              < deploy/install-tinyassets-env.sh

      - name: Sync runtime deploy files
        run: |
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/compose.yml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-compose.yml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector.yaml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-vector.yaml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector-betterstack.yaml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-vector-betterstack.yaml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector-entrypoint.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-vector-entrypoint.sh"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/tinyassets-daemon.service \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-daemon.service"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; \
               sudo mkdir -p /opt/tinyassets/deploy; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-compose.yml /opt/tinyassets/compose.yml; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-compose.yml /opt/tinyassets/deploy/compose.yml; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-vector.yaml /opt/tinyassets/deploy/vector.yaml; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-vector-betterstack.yaml /opt/tinyassets/deploy/vector-betterstack.yaml; \
               sudo install -m 0755 -o tinyassets -g tinyassets /tmp/tinyassets-vector-entrypoint.sh /opt/tinyassets/deploy/vector-entrypoint.sh; \
               sudo install -m 0644 -o root -g root /tmp/tinyassets-daemon.service /etc/systemd/system/tinyassets-daemon.service; \
               sudo systemctl daemon-reload"

      - name: Preflight droplet disk before image pull
        id: disk-preflight
        run: |
          # A full root volume can make both the forward deploy and the rollback
          # fail while the live daemon is already down. Reclaim disposable state
          # before touching TINYASSETS_IMAGE or pulling the new image.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s' <<'SH'
          set -euo pipefail

          threshold=85
          fail_threshold=90

          max_disk_pct() {
            max=0
            for path in / /var/lib/docker /data; do
              [ -e "$path" ] || continue
              pct="$(df -P "$path" | awk 'NR==2 {gsub("%", "", $5); print $5}')"
              case "$pct" in
                ''|*[!0-9]*) pct=0 ;;
              esac
              if [ "$pct" -gt "$max" ]; then
                max="$pct"
              fi
            done
            echo "$max"
          }

          echo "disk preflight before cleanup:"
          df -h / /var/lib/docker /data 2>&1 || true

          before="$(max_disk_pct)"
          if [ "$before" -ge "$threshold" ]; then
            echo "::warning::disk usage ${before}% >= ${threshold}%; pruning disposable Docker/build/journal state before deploy"
            docker system prune -af 2>&1 | tail -80 || true
            docker builder prune -af 2>&1 | tail -80 || true
            journalctl --vacuum-time=3d 2>&1 | tail -20 || true
          else
            echo "disk usage ${before}% < ${threshold}%; no pre-deploy prune needed"
          fi

          echo "disk preflight after cleanup:"
          df -h / /var/lib/docker /data 2>&1 || true

          after="$(max_disk_pct)"
          if [ "$after" -ge "$fail_threshold" ]; then
            echo "::error::disk usage still ${after}% >= ${fail_threshold}% after prune; refusing deploy before image pull/restart"
            exit 1
          fi
          SH

      # Codex CLI rotates single-use OAuth refresh tokens in-place inside
      # the container. compose.yml sets CODEX_HOME=/data/.codex and
      # CLAUDE_CONFIG_DIR=/data/.claude for daemon + worker, backed by the
      # shared tinyassets-data volume, so rotated subscription auth survives
      # container restart. This step makes those directories self-provisioning
      # on every deploy — idempotent, no host hands required, per the Forever
      # Rule (24/7 uptime, zero hosts online).
      #
      # Three idempotent branches:
      #   - tinyassets-data/.codex already present -> skip creation
      #   - /data/.codex/auth.json already in volume -> skip migration
      #   - no running container with /data/.codex/auth.json or legacy
      #     /app/.codex/auth.json -> skip migration
      #     (new container will seed from TINYASSETS_CODEX_AUTH_JSON_B64 on first boot)
      #   - /data/.claude already present -> preserve; otherwise migrate from
      #     a running container's /data/.claude or legacy /app/.claude.
      #
      # The migration branch only fires once: the first deploy after this
      # CODEX_HOME move onto a live droplet where tinyassets-worker has a
      # rotated auth.json at either the new or legacy location.
      - name: Prepare codex auth persistent volume
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s' <<'SH'
          set -euo pipefail

          VOLUME_NAME="tinyassets-data"
          TINYASSETS_UID=1001
          TINYASSETS_GID=1001

          docker volume create "$VOLUME_NAME" >/dev/null
          VOLUME_DIR="$(docker volume inspect "$VOLUME_NAME" --format '{{ .Mountpoint }}')"
          CODEX_DIR="$VOLUME_DIR/.codex"
          CLAUDE_DIR="$VOLUME_DIR/.claude"

          # OAuth registration state lives directly at /data/.auth.db.
          # The volume root must be writable by the container's uid 1001;
          # otherwise every public MCP initialize request fails in
          # OptionalOAuthProvider with sqlite3 "unable to open database file".
          chown "$TINYASSETS_UID:$TINYASSETS_GID" "$VOLUME_DIR"
          chmod 755 "$VOLUME_DIR"
          find "$VOLUME_DIR" -maxdepth 1 -type f \
            \( -name '.auth.db' -o -name '.auth.db-*' \) \
            -exec chown "$TINYASSETS_UID:$TINYASSETS_GID" {} + \
            -exec chmod 600 {} + || true

          # Create the directory if missing. mkdir -p is itself a no-op
          # when the path already exists.
          if [ ! -d "$CODEX_DIR" ]; then
            echo "creating codex auth persistent directory at $CODEX_DIR"
            mkdir -p "$CODEX_DIR"
          fi

          # Ownership + mode are repaired UNCONDITIONALLY every deploy.
          # If a prior attempt left the dir root-owned, this heals the
          # posture so uid 1001 can write. Both chown and chmod are
          # themselves idempotent — no-op when state already matches.
          chown "$TINYASSETS_UID:$TINYASSETS_GID" "$CODEX_DIR"
          chmod 700 "$CODEX_DIR"

          # Migration: if the volume is empty but a tinyassets-worker container is
          # currently running with a Codex auth.json inside it, copy the live
          # refresh chain into /data/.codex so the new container preserves it
          # instead of falling back to the stale env-var secret.
          if [ ! -f "$CODEX_DIR/auth.json" ]; then
            tmp_dir="$(mktemp -d)"
            trap 'rm -rf "$tmp_dir"' EXIT
            if docker inspect tinyassets-worker >/dev/null 2>&1; then
              if docker exec tinyassets-worker test -f /data/.codex/auth.json 2>/dev/null; then
                echo "migrating live codex auth.json from tinyassets-worker:/data/.codex"
                docker cp tinyassets-worker:/data/.codex/auth.json "$tmp_dir/auth.json"
              elif docker exec tinyassets-worker test -f /app/.codex/auth.json 2>/dev/null; then
                echo "migrating legacy codex auth.json from tinyassets-worker:/app/.codex"
                docker cp tinyassets-worker:/app/.codex/auth.json "$tmp_dir/auth.json"
              fi
            fi
            if [ -s "$tmp_dir/auth.json" ]; then
              cp "$tmp_dir/auth.json" "$CODEX_DIR/auth.json"
              chown "$TINYASSETS_UID:$TINYASSETS_GID" "$CODEX_DIR/auth.json"
              chmod 600 "$CODEX_DIR/auth.json"
            fi
          fi

          # Confirm final state for the log.
          ls -la "$CODEX_DIR" || true

          if [ ! -d "$CLAUDE_DIR" ]; then
            echo "creating Claude auth persistent directory at $CLAUDE_DIR"
            mkdir -p "$CLAUDE_DIR"
          fi
          chown -R "$TINYASSETS_UID:$TINYASSETS_GID" "$CLAUDE_DIR"
          chmod 700 "$CLAUDE_DIR"

          if ! find "$CLAUDE_DIR" -mindepth 1 -maxdepth 1 | grep -q .; then
            tmp_claude="$(mktemp -d)"
            if docker inspect tinyassets-worker >/dev/null 2>&1; then
              if docker exec tinyassets-worker test -d /data/.claude 2>/dev/null; then
                echo "migrating live Claude config from tinyassets-worker:/data/.claude"
                docker cp tinyassets-worker:/data/.claude/. "$tmp_claude/" || true
              elif docker exec tinyassets-worker test -d /app/.claude 2>/dev/null; then
                echo "migrating legacy Claude config from tinyassets-worker:/app/.claude"
                docker cp tinyassets-worker:/app/.claude/. "$tmp_claude/" || true
              fi
            fi
            if find "$tmp_claude" -mindepth 1 -maxdepth 1 | grep -q .; then
              cp -a "$tmp_claude"/. "$CLAUDE_DIR"/
              chown -R "$TINYASSETS_UID:$TINYASSETS_GID" "$CLAUDE_DIR"
              find "$CLAUDE_DIR" -type d -exec chmod 700 {} +
              find "$CLAUDE_DIR" -type f -exec chmod 600 {} +
            fi
            rm -rf "$tmp_claude"
          fi

          ls -la "$CLAUDE_DIR" || true
          SH

      - name: Retire legacy Workflow service
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s' <<'SH'
          set -euo pipefail

          legacy_units=(
            workflow-daemon.service
            workflow.service
            workflow-watchdog.timer
            workflow-watchdog.service
            workflow-backup.timer
            workflow-backup.service
            workflow-disk-watch.timer
            workflow-disk-watch.service
            workflow-prune.timer
            workflow-prune.service
            workflow-ship-logs.timer
            workflow-ship-logs.service
          )

          for unit in "${legacy_units[@]}"; do
            if systemctl list-unit-files "$unit" --no-legend 2>/dev/null | grep -q . \
              || systemctl list-units "$unit" --all --no-legend 2>/dev/null | grep -q .; then
              echo "retiring legacy unit ${unit}"
              systemctl disable --now "$unit" || true
              systemctl stop "$unit" || true
            fi
          done

          for compose_file in /opt/workflow/compose.yml /opt/workflow/deploy/compose.yml; do
            if [ -f "$compose_file" ]; then
              echo "bringing down legacy compose stack from ${compose_file}"
              if [ -f /etc/workflow/env ]; then
                docker compose --env-file /etc/workflow/env -f "$compose_file" down --timeout 30 || true
              else
                docker compose -f "$compose_file" down --timeout 30 || true
              fi
            fi
          done

          legacy_ids="$(docker ps -aq --filter 'name=^/workflow' || true)"
          if [ -n "$legacy_ids" ]; then
            echo "removing legacy workflow containers: ${legacy_ids}"
            docker rm -f $legacy_ids || true
          fi
          for container in \
            workflow-daemon \
            workflow-tunnel \
            workflow-logs \
            workflow-worker \
            workflow-worker-codex-2 \
            workflow-worker-claude-1 \
            workflow-worker-claude-2; do
            docker rm -f "$container" >/dev/null 2>&1 || true
          done

          for unit_file in /etc/systemd/system/workflow*.service /etc/systemd/system/workflow*.timer; do
            if [ -e "$unit_file" ] || [ -L "$unit_file" ]; then
              echo "removing legacy unit file ${unit_file}"
              rm -f "$unit_file"
            fi
          done
          systemctl daemon-reload
          systemctl reset-failed "${legacy_units[@]}" || true
          systemctl mask workflow-daemon.service workflow.service workflow-watchdog.timer || true
          SH

      - name: Deploy new image
        id: deploy
        env:
          TINYASSETS_CODEX_AUTH_JSON_B64: ${{ secrets.TINYASSETS_CODEX_AUTH_JSON_B64 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64: ${{ secrets.TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 }}
          # PR-128 — Phase 2 effector capability map. JSON object
          # mapping "<owner>/<repo>" -> "<token>" (round-2 P1.2
          # shape). Read by tinyassets.effectors.github_pr at
          # invocation time; never echoed into branch-visible state.
          TINYASSETS_GITHUB_PR_CAPABILITIES: ${{ secrets.TINYASSETS_GITHUB_PR_CAPABILITIES }}
        run: |
          NEW_IMAGE="${{ steps.tag.outputs.image_ref }}"
          echo "Deploying: ${NEW_IMAGE}"
          # Pin the new tag in /etc/tinyassets/env via the atomic helper.
          # Helper enforces root:tinyassets 640 in a single install(1)
          # call + asserts post-write readability by user=tinyassets.
          # Replaces the legacy sed -i + chown + chmod chain that was
          # the 2026-04-21 P0 root cause.
          # First scp the helper to the droplet, then exec it with the
          # new value piped in via stdin. Two SSH round-trips, but
          # avoids stdin-multiplexing fragility on the runner shell.
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/install-tinyassets-env.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/install-tinyassets-env.sh"
          echo "image_mutation_started=true" >> "$GITHUB_OUTPUT"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' '${NEW_IMAGE}' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_IMAGE"
          # Cutover (2026-05-29): route file_bug investigation requests to the
          # user-buildable patch-request loop instead of the legacy cheat branch.
          # patch_request_loop_v5 (branch_def_id 0ca6e9c97f65) localizes via
          # search_repo_files, reads existing files via read_repo_files, edits
          # via the github_pull_request effector's edits_json diff format, and
          # opens a real draft PR. Replaces fd5c66b1d87d, which produced only
          # analysis packets and was failing every run. Idempotent set; reverting
          # this block restores the prior handler on the next deploy.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' '0ca6e9c97f65' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_BUG_INVESTIGATION_BRANCH_DEF_ID"
          # Enqueue go-live (2026-06-03): turn ON the in-node paced enqueue verb
          # so a user-built driver branch can append run-requests to its own
          # universe's dispatcher queue. The verb shipped dark in #1214 and was
          # hardened in #1221 (trusted-universe targeting, global + per-origin
          # queue caps, target-branch authority, forced request_type=branch_run).
          # Codex cleared the review gate round-3 APPROVE (2026-06-03).
          # ORDERING INVARIANT: this line is only safe once #1221 is merged AND
          # deployed — flipping it while prod runs the pre-#1221 (un-contained)
          # verb would enable the unguarded path. Do not merge this PR until the
          # release-state sha includes #1221. Idempotent set; reverting this
          # block returns the verb to fail-closed dark on the next deploy.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' 'on' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_NODE_ENQUEUE_ENABLED"
          # Soul-loop go-live (2026-06-03): turn ON soul-declared loop dispatch
          # so the daemon runs a souled universe's declared loop_branch_def_id
          # (a user-built branch) via execute_branch instead of the fantasy
          # cycle. Shipped dark in #1223, Codex round-2 APPROVE (2026-06-03).
          # SAFE because it is inert until a souled universe with a declared
          # loop exists; soulless/legacy universes are untouched. The pick is
          # active in this mode so child tasks the driver enqueues drain (no
          # starvation). ORDERING INVARIANT: only flip once #1223 is merged AND
          # deployed (release-state sha includes #1223). Idempotent set;
          # reverting returns soul-loop dispatch to fail-closed dark next deploy.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' 'on' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_SOUL_LOOP_DISPATCH"
          # Auth mode (founder-identity cutover, PR #1437). PR #1437's
          # per-universe ACL gate (permissions.universe_access_allows) denies
          # ALL anonymous writes regardless of provider mode. So going live is a
          # COORDINATED cutover: when the WORKOS_AUTHKIT_DOMAIN secret is
          # present, run the WorkOS Resource Server (founders authenticate and
          # write to their OWN universe via the ACL); WORKOS_MCP_RESOURCE binds
          # tokens to this server (fail-closed audience, so WORKOS_ALLOW_NO_AUDIENCE
          # is forced off). WORKOS_REQUIRE_AUTH controls whether the connector
          # forces OAuth on connect. When the secret is ABSENT we leave
          # `optional` (unchanged auth resolution) — but note that under #1437's
          # ACL gate that leaves the live surface READ-ONLY for anonymous writes
          # until the secret lands. ROLLBACK: install-tinyassets-env.sh writes
          # persistent state to /etc/tinyassets/env; a follow-up deploy must
          # explicitly set UNIVERSE_SERVER_AUTH back. Idempotent sets.
          if [ "${HAS_WORKOS_CONFIG}" = "true" ]; then
            echo "WorkOS config secret present; enabling WorkOS Resource Server auth (founder identity, PR #1437)."
            printf '%s' 'workos' | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set UNIVERSE_SERVER_AUTH"
            printf '%s' "${WORKOS_AUTHKIT_DOMAIN}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set WORKOS_AUTHKIT_DOMAIN"
            printf '%s' "${WORKOS_MCP_RESOURCE}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set WORKOS_MCP_RESOURCE"
            printf '%s' "${WORKOS_REQUIRE_AUTH}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set WORKOS_REQUIRE_AUTH"
            # Fail-closed audience binding in prod: force the dev-only escape
            # hatch off so a same-issuer token can never be reused here.
            printf '%s' '0' | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set WORKOS_ALLOW_NO_AUDIENCE"
          else
            echo "::warning::WORKOS_AUTHKIT_DOMAIN secret not visible to deploy; leaving UNIVERSE_SERVER_AUTH=optional. With PR #1437's ACL gate the live surface is READ-ONLY for anonymous writes until the WorkOS secret is added."
            printf '%s' 'optional' | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set UNIVERSE_SERVER_AUTH"
          fi
          if [ "${HAS_CODEX_AUTH_BUNDLE}" = "true" ]; then
            echo "Deploy-visible TINYASSETS_CODEX_AUTH_JSON_B64 found; syncing subscription auth bundle."
            printf '%s' "${TINYASSETS_CODEX_AUTH_JSON_B64}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_CODEX_AUTH_JSON_B64"
            printf '%s' '0' | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_ALLOW_API_KEY_PROVIDERS"
          else
            echo "::warning::TINYASSETS_CODEX_AUTH_JSON_B64 is not visible to deploy; leaving any existing droplet subscription auth untouched."
          fi
          # Claude provider auth: sync CLAUDE_CODE_OAUTH_TOKEN into
          # /etc/tinyassets/env (same atomic helper) so claude-code workers
          # authenticate from the env on a fresh /data volume. Without it the
          # deploy could only migrate creds from a live container — a circular
          # dependency that fails once the credentials are gone (the 2026-06-25
          # loop-wedge root cause). The entrypoint also seeds a credentials file
          # from TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 when present; the env token
          # is preferred (rotation-safe).
          if [ "${HAS_CLAUDE_OAUTH_TOKEN}" = "true" ]; then
            echo "Deploy-visible CLAUDE_CODE_OAUTH_TOKEN found; syncing claude-code auth token."
            printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set CLAUDE_CODE_OAUTH_TOKEN"
          elif [ "${HAS_CLAUDE_CREDENTIALS_BUNDLE}" = "true" ]; then
            echo "Deploy-visible TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 found; syncing claude credentials bundle."
            printf '%s' "${TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64"
          else
            echo "::warning::No claude auth (CLAUDE_CODE_OAUTH_TOKEN / TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64) visible to deploy; leaving any existing droplet claude auth untouched."
          fi
          # PR-128 — sync the Phase 2 effector capability map. Same
          # install-tinyassets-env.sh helper, same atomic write
          # contract. The map MUST decode to a JSON object keyed by
          # "<owner>/<repo>" -> "<token>"; the effector
          # (tinyassets.effectors.github_pr) validates the shape and
          # logs loudly on malformed JSON. When the secret is unset,
          # the effector returns missing_capability dry-run evidence
          # — emit a deploy-time warning so the operator notices
          # before chatbots start filing for real-write attempts.
          if [ "${HAS_GITHUB_PR_CAPABILITY}" = "true" ]; then
            echo "Deploy-visible TINYASSETS_GITHUB_PR_CAPABILITIES found; syncing GitHub PR capability map."
            printf '%s' "${TINYASSETS_GITHUB_PR_CAPABILITIES}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_GITHUB_PR_CAPABILITIES"
          else
            # Round-2 fix (Codex round-1 finding on PR #980): the
            # documented contract is "absence -> dry-run". Round-1
            # logged a warning but left any prior
            # TINYASSETS_GITHUB_PR_CAPABILITIES value in
            # /etc/tinyassets/env, which meant deleting the GH Actions
            # secret to revoke had no effect — the next deploy
            # restarted the daemon with the OLD capability still
            # active. Fix: when the secret is absent, explicitly
            # delete the key from the droplet env so the effector
            # observes "missing capability" on its next read. The
            # install-tinyassets-env.sh helper's `delete` subcommand is
            # a no-op when the key is already absent (assert_readable
            # still passes), so re-running this on a clean droplet
            # is safe.
            echo "::warning::TINYASSETS_GITHUB_PR_CAPABILITIES is not visible to deploy; removing any prior capability from /etc/tinyassets/env so effects emission stays dry-run with error_kind=missing_capability."
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh delete TINYASSETS_GITHUB_PR_CAPABILITIES"
          fi
          {
            echo "## Deploy subscription auth"
            echo ""
            echo "- TINYASSETS_CODEX_AUTH_JSON_B64 visible to deploy: \`${HAS_CODEX_AUTH_BUNDLE}\`"
            echo "- API-key providers forced off when the Codex subscription bundle is synced."
            echo "- TINYASSETS_GITHUB_PR_CAPABILITIES visible to deploy: \`${HAS_GITHUB_PR_CAPABILITY}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          # Pull + restart via the systemd unit (which runs docker
          # compose down + up with the new env).
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; sudo docker pull '${NEW_IMAGE}'; sudo systemctl restart tinyassets-daemon"

      # Independent of the helper's in-call readability assert: re-verify
      # after the systemd restart has settled. Steady-state canary that
      # catches any out-of-band perm drift between the env install and
      # the post-restart compose steady state (e.g. manual SSH edit
      # racing the deploy step — RC-2 in the env mode-flip audit).
      - name: Assert /etc/tinyassets/env readable by daemon user
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo -u tinyassets test -r /etc/tinyassets/env' || {
            echo "::error::ENV-UNREADABLE — /etc/tinyassets/env not readable by user 'tinyassets' after restart. cloudflared will silently fail to start."
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                'sudo ls -l /etc/tinyassets/env' || true
            exit 1
          }

      - name: Wait for daemon health
        run: |
          # Give compose time to bring the new image up + healthcheck
          # to settle. Cold-start budget 90s.
          for i in $(seq 1 18); do
            if python scripts/mcp_public_canary.py \
                 --url "${CANARY_URL}" --timeout 10 >/dev/null 2>&1; then
              echo "canonical green after ${i} poll(s)"
              break
            fi
            sleep 5
            if [ "$i" = "18" ]; then
              echo "::error::canary still red after 90s — rolling back"
              exit 1
            fi
          done

      - name: Verify cloud worker is running
        run: |
          worker_containers="tinyassets-worker tinyassets-worker-codex-2 tinyassets-worker-claude-1 tinyassets-worker-claude-2"
          for container in ${worker_containers}; do
            running=""
            for i in $(seq 1 30); do
              running=$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                  "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                  "sudo docker inspect -f '{{.State.Running}}' ${container} 2>/dev/null || true")
              if [ "${running}" = "true" ]; then
                echo "${container} running after ${i} poll(s)"
                break
              fi
              sleep 2
            done
            if [ "${running}" != "true" ]; then
              echo "::error::${container} is not running after deploy; node execution fleet is not 24/7."
              ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                  "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                  "sudo docker compose --env-file /etc/tinyassets/env -f /opt/tinyassets/compose.yml ps; sudo docker ps -a --filter name=${container}; sudo docker logs --tail 120 ${container} 2>&1 || true"
              exit 1
            fi
            if ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo docker exec ${container} env | grep -q '^TINYASSETS_UNIVERSE='"; then
              echo "::error::${container} inherited TINYASSETS_UNIVERSE from /etc/tinyassets/env. That stdio-only override can bind a worker to a different universe than the public MCP default."
              exit 1
            fi
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo docker logs --tail 160 ${container} 2>&1 | grep -E 'cloud_worker:|Registered|Graph execution failed|subprocess exited|spawn failed|No module named|Traceback' || true"
          done
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo docker exec -i tinyassets-worker python -' <<'PY'
          import os
          from pathlib import Path
          from tinyassets.cloud_worker import _resolve_universe_path

          root = Path(os.environ.get("TINYASSETS_DATA_DIR", "/data"))
          active_marker = root / ".active_universe"
          try:
              active = active_marker.read_text(encoding="utf-8").strip()
          except OSError:
              active = ""

          universe = _resolve_universe_path()
          print(f"worker diagnostic: data_root={root}")
          print(f"worker diagnostic: active_marker={active or '<unset>'}")
          print(f"worker diagnostic: resolved_universe={universe}")
          for name in (
              ".runtime_status.json",
              "status.json",
              "activity.log",
              "enrichment_signals.json",
              "worldbuild_signals.json",
              "work_targets.json",
          ):
              path = universe / name
              try:
                  size = path.stat().st_size if path.exists() else 0
              except OSError:
                  size = -1
              print(f"worker diagnostic: {name} exists={path.exists()} bytes={size}")
          PY

      - name: Post-deploy canary — canonical URL only
        id: canary
        run: |
          # Since CF Access Option-1 cutover, the direct URL (mcp.tinyassets.io)
          # correctly returns 403. Only the canonical URL is a valid health signal.
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose

      - name: Post-deploy 5-handle surface assertion (PR-178)
        run: |
          # Drift guard: the live /mcp must advertise exactly the five
          # canonical handles (read/write/run.graph + read/write.page, plus
          # optional get_status). Fails the deploy if the user surface
          # regresses to the legacy fat tools.
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --assert-handles --verbose

      - name: Verify subscription LLM binding after synced Codex auth
        if: env.HAS_CODEX_AUTH_BUNDLE == 'true'
        run: |
          python scripts/verify_llm_binding.py \
              --url "${CANARY_URL}" --timeout 20 --require-sandbox \
              --retries 12 --retry-delay 10

      - name: Report subscription LLM binding when no deploy auth bundle is configured
        if: env.HAS_CODEX_AUTH_BUNDLE != 'true'
        run: |
          python scripts/verify_llm_binding.py \
              --url "${CANARY_URL}" --timeout 20 --require-sandbox \
              --retries 12 --retry-delay 10
          echo "Subscription LLM binding and sandbox runtime are already live."

      - name: Verify CF Access gates direct URL (expects 403/401)
        id: access-gate
        run: |
          # Confirm CF Access is still protecting the direct tunnel URL.
          # 403/401 = correct. 200 = Access accidentally disabled — FAIL deploy.
          # 000/timeout = tunnel down (advisory only — not a deploy blocker).
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "${DIRECT_URL}" || echo "000")
          echo "direct URL HTTP status: ${http_code}"
          if [ "${http_code}" = "200" ]; then
            echo "::error::CF Access is OPEN on ${DIRECT_URL} (returned 200). Access policy may be disabled."
            echo "::error::Fix: Cloudflare dashboard → Access → Applications → confirm tunnel policy is active."
            exit 1
          elif [ "${http_code}" = "000" ]; then
            echo "::warning::Direct URL unreachable (${DIRECT_URL}) — tunnel may be down. Daemon is still live via canonical."
          else
            echo "Access gate confirmed: ${DIRECT_URL} → HTTP ${http_code} (expected 403/401)"
          fi

      - name: Mark forward path complete
        id: forward
        run: echo "forward_succeeded=true" >> "$GITHUB_OUTPUT"

      - name: Rollback on failure
        id: rollback
        if: always()
        env:
          PRODUCTION_MUTATION_STARTED: ${{ steps.production_mutation.outputs.production_mutation_started }}
          IMAGE_MUTATION_STARTED: ${{ steps.deploy.outputs.image_mutation_started }}
          FORWARD_SUCCEEDED: ${{ steps.forward.outputs.forward_succeeded }}
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
          TARGET_REPOSITORY: ${{ steps.tag.outputs.image }}
        run: |
          set +e
          rollback_attempted=false
          rollback_result=not_attempted
          rollback_canary_status=not_run
          rollback_reason=pre_host_write_failure
          emit_rollback_outputs() {
            {
              echo "rollback_attempted=${rollback_attempted}"
              echo "rollback_result=${rollback_result}"
              echo "rollback_canary_status=${rollback_canary_status}"
              echo "rollback_reason=${rollback_reason}"
            } >> "$GITHUB_OUTPUT"
          }
          emit_rollback_outputs

          if [ "${PRODUCTION_MUTATION_STARTED}" != "true" ] \
              && [ "${IMAGE_MUTATION_STARTED}" != "true" ]; then
            rollback_reason=pre_host_write_failure
            emit_rollback_outputs
            exit 0
          fi
          if [ "${PRODUCTION_MUTATION_STARTED}" = "true" ] \
              && [ "${IMAGE_MUTATION_STARTED}" != "true" ]; then
            rollback_reason=image_mutation_not_started
            emit_rollback_outputs
            exit 0
          fi
          if [ "${PRODUCTION_MUTATION_STARTED}" != "true" ] \
              || [ "${IMAGE_MUTATION_STARTED}" != "true" ]; then
            rollback_reason=no_valid_target
            emit_rollback_outputs
            exit 1
          fi
          if [ "${FORWARD_SUCCEEDED}" = "true" ]; then
            rollback_reason=not_needed
            emit_rollback_outputs
            exit 0
          fi
          if [ -z "${PREV_IMAGE}" ]; then
            rollback_reason=no_valid_target
            emit_rollback_outputs
            exit 1
          fi

          rollback_attempted=true
          rollback_reason=attempted
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/install-tinyassets-env.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/install-tinyassets-env.sh"
          command_status=$?
          if [ "${command_status}" -eq 0 ]; then
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "printf '%s' '${PREV_IMAGE}' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_IMAGE"
            command_status=$?
          fi
          if [ "${command_status}" -eq 0 ]; then
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "set -e; sudo docker pull '${PREV_IMAGE}'; sudo systemctl restart tinyassets-daemon"
            command_status=$?
          fi
          if [ "${command_status}" -ne 0 ]; then
            rollback_result=failed
            rollback_canary_status=not_run
            emit_rollback_outputs
            exit 1
          fi

          sleep 30
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose
          canary_status=$?
          if [ "${canary_status}" -ne 0 ]; then
            rollback_result=failed
            rollback_canary_status=failed
            emit_rollback_outputs
            exit 1
          fi
          rollback_canary_status=passed
          rollback_result=succeeded

          observation_json="$(
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash -s -- '${TARGET_REPOSITORY}'" <<'REMOTE'
          set -euo pipefail
          target_repository="$1"
          configured_image_ref="$(
            grep -E '^TINYASSETS_IMAGE=' /etc/tinyassets/env 2>/dev/null \
              | tail -1 | cut -d= -f2- || true
          )"
          image_id="$(
            docker inspect --type container --format '{{.Image}}' \
              tinyassets-daemon 2>/dev/null || true
          )"
          repo_digests_json='[]'
          if [ -n "${image_id}" ]; then
            repo_digests_json="$(
              docker image inspect "${image_id}" \
                --format '{{json .RepoDigests}}' 2>/dev/null || printf '[]'
            )"
          fi
          export target_repository configured_image_ref repo_digests_json
          python3 - <<'PY'
          import json
          import os
          try:
              digests = json.loads(os.environ["repo_digests_json"])
          except (json.JSONDecodeError, TypeError):
              digests = []
          print(json.dumps({
              "repository": os.environ["target_repository"],
              "configured": os.environ["configured_image_ref"],
              "repo_digests": digests if isinstance(digests, list) else [],
          }, sort_keys=True, separators=(",", ":")))
          PY
          REMOTE
          )"
          OBSERVATION_JSON="${observation_json}" PREVIOUS="${PREV_IMAGE}" python - <<'PY'
          import json
          import os
          import re
          import sys

          canonical = re.compile(
              r"^[a-z0-9]+(?:[._-][a-z0-9]+)*(?::[0-9]+)?"
              r"(?:/[a-z0-9]+(?:[._-][a-z0-9]+)*)+"
              r"@sha256:[0-9a-f]{64}$"
          )
          observed = json.loads(os.environ["OBSERVATION_JSON"])
          configured = observed.get("configured", "")
          candidates = sorted({
              value for value in observed.get("repo_digests", [])
              if isinstance(value, str)
              and value.startswith(f"{observed['repository']}@sha256:")
              and canonical.fullmatch(value)
          })
          running = candidates[0] if len(candidates) == 1 else ""
          previous = os.environ["PREVIOUS"]
          if not (
              canonical.fullmatch(configured or "")
              and configured == running == previous
          ):
              sys.exit(1)
          PY
          identity_status=$?
          if [ "${identity_status}" -ne 0 ]; then
            emit_rollback_outputs
            exit 1
          fi
          emit_rollback_outputs
          exit 0

      - name: Publish release-state receipt
        id: terminal
        if: always()
        env:
          PRODUCTION_MUTATION_STARTED: ${{ steps.production_mutation.outputs.production_mutation_started }}
          IMAGE_MUTATION_STARTED: ${{ steps.deploy.outputs.image_mutation_started }}
          FORWARD_SUCCEEDED: ${{ steps.forward.outputs.forward_succeeded }}
          FORWARD_CANARY_OUTCOME: ${{ steps.canary.outcome }}
          ROLLBACK_ATTEMPTED: ${{ steps.rollback.outputs.rollback_attempted }}
          ROLLBACK_RESULT: ${{ steps.rollback.outputs.rollback_result }}
          ROLLBACK_CANARY_STATUS: ${{ steps.rollback.outputs.rollback_canary_status }}
          ROLLBACK_REASON: ${{ steps.rollback.outputs.rollback_reason }}
          TARGET_REPOSITORY: ${{ steps.tag.outputs.image }}
          ATTEMPTED_IMAGE_TAG: ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          ATTEMPTED_IMAGE_REF: ${{ steps.tag.outputs.image_ref }}
          PREVIOUS_CONFIGURED_IMAGE_REF: ${{ steps.prev.outputs.previous_configured_image_ref }}
          PREVIOUS_RUNNING_IMAGE_REF: ${{ steps.prev.outputs.previous_running_image_ref }}
          PRIOR_RECEIPT_B64: ${{ steps.prev.outputs.prior_receipt_b64 }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          BUILD_RUN_ID: ${{ github.event.workflow_run.id }}
          BUILD_RUN_URL: ${{ github.event.workflow_run.html_url }}
          TINYASSETS_EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "${PRODUCTION_MUTATION_STARTED}" != "true" ]; then
            echo "terminal_receipt_result=not_applicable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "terminal_receipt_result=failed" >> "$GITHUB_OUTPUT"

          terminal_observation="$(
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash -s -- '${TARGET_REPOSITORY}' '${ATTEMPTED_IMAGE_REF}'" <<'REMOTE'
          set -euo pipefail
          target_repository="$1"
          attempted_image_ref="$2"
          configured_image_ref="$(
            grep -E '^TINYASSETS_IMAGE=' /etc/tinyassets/env 2>/dev/null \
              | tail -1 | cut -d= -f2- || true
          )"
          image_id="$(
            docker inspect --type container --format '{{.Image}}' \
              tinyassets-daemon 2>/dev/null || true
          )"
          repo_digests_json='[]'
          active_revision_label=''
          if [ -n "${image_id}" ]; then
            repo_digests_json="$(
              docker image inspect "${image_id}" \
                --format '{{json .RepoDigests}}' 2>/dev/null || printf '[]'
            )"
            active_revision_label="$(
              docker image inspect "${image_id}" \
                --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' \
                2>/dev/null || true
            )"
          fi
          attempted_revision_label="$(
            docker image inspect "${attempted_image_ref}" \
              --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' \
              2>/dev/null || true
          )"
          config_hash="$(
            sha256sum /etc/tinyassets/env 2>/dev/null | awk '{print $1}' || true
          )"
          release_state_host_dir="$(
            docker volume inspect tinyassets-data \
              --format '{{ .Mountpoint }}' 2>/dev/null
          )"
          export target_repository configured_image_ref repo_digests_json
          export active_revision_label attempted_revision_label config_hash
          export release_state_host_dir
          python3 - <<'PY'
          import json
          import os
          try:
              digests = json.loads(os.environ["repo_digests_json"])
          except (json.JSONDecodeError, TypeError):
              digests = []
          print(json.dumps({
              "repository": os.environ["target_repository"],
              "configured": os.environ["configured_image_ref"],
              "repo_digests": digests if isinstance(digests, list) else [],
              "active_revision_label": os.environ["active_revision_label"],
              "attempted_revision_label": os.environ["attempted_revision_label"],
              "config_hash": os.environ["config_hash"],
              "release_state_host_dir": os.environ["release_state_host_dir"],
          }, sort_keys=True, separators=(",", ":")))
          PY
          REMOTE
          )"

          export terminal_observation
          python - "$RUNNER_TEMP/deploy-terminal-observation.json" <<'PY'
          import json
          import os
          import re
          import sys
          from datetime import UTC, datetime

          canonical = re.compile(
              r"^[a-z0-9]+(?:[._-][a-z0-9]+)*(?::[0-9]+)?"
              r"(?:/[a-z0-9]+(?:[._-][a-z0-9]+)*)+"
              r"@sha256:[0-9a-f]{64}$"
          )
          observed = json.loads(os.environ["terminal_observation"])
          repository = observed["repository"]
          configured = observed.get("configured", "")
          if not isinstance(configured, str) or not canonical.fullmatch(configured):
              configured = ""
          candidates = sorted({
              value for value in observed.get("repo_digests", [])
              if isinstance(value, str)
              and value.startswith(f"{repository}@sha256:")
              and canonical.fullmatch(value)
          })
          running = candidates[0] if len(candidates) == 1 else ""

          def marker(value):
              if value == "true":
                  return True
              if value == "false" or value == "":
                  return False
              return value

          canary_outcome = os.environ.get("FORWARD_CANARY_OUTCOME", "")
          forward_canary_status = {
              "success": "passed",
              "failure": "failed",
          }.get(canary_outcome, "not_run")
          config_hash = observed.get("config_hash", "")
          if isinstance(config_hash, str) and re.fullmatch(r"[0-9a-f]{64}", config_hash):
              config_hash = f"sha256:{config_hash}"
          else:
              config_hash = ""
          value = {
              "production_mutation_started": marker(
                  os.environ.get("PRODUCTION_MUTATION_STARTED", "")
              ),
              "image_mutation_started": marker(
                  os.environ.get("IMAGE_MUTATION_STARTED", "")
              ),
              "forward_deploy_status": (
                  "succeeded"
                  if os.environ.get("FORWARD_SUCCEEDED") == "true"
                  else "failed"
              ),
              "forward_canary_status": forward_canary_status,
              "rollback_attempted": marker(
                  os.environ.get("ROLLBACK_ATTEMPTED", "")
              ),
              "rollback_result": os.environ.get("ROLLBACK_RESULT", ""),
              "rollback_canary_status": os.environ.get(
                  "ROLLBACK_CANARY_STATUS", ""
              ),
              "rollback_reason": os.environ.get("ROLLBACK_REASON", ""),
              "attempted_image_tag": os.environ.get("ATTEMPTED_IMAGE_TAG", ""),
              "attempted_image_ref": os.environ.get("ATTEMPTED_IMAGE_REF", ""),
              "attempted_revision_label": observed.get(
                  "attempted_revision_label", ""
              ),
              "workflow_event": os.environ.get("TINYASSETS_EVENT", ""),
              "workflow_head_sha": os.environ.get("WORKFLOW_HEAD_SHA", ""),
              "github_sha": os.environ.get("GITHUB_SHA_VALUE", ""),
              "build_run_id": os.environ.get("BUILD_RUN_ID", ""),
              "build_run_url": os.environ.get("BUILD_RUN_URL", ""),
              "deploy_run_id": os.environ["GITHUB_RUN_ID"],
              "deploy_run_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "actor": os.environ["GITHUB_ACTOR"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "previous_configured_image_ref": os.environ.get(
                  "PREVIOUS_CONFIGURED_IMAGE_REF", ""
              ),
              "previous_running_image_ref": os.environ.get(
                  "PREVIOUS_RUNNING_IMAGE_REF", ""
              ),
              "configured_image_ref": configured,
              "running_image_ref": running,
              "active_revision_label": observed.get(
                  "active_revision_label", ""
              ),
              "config_hash": config_hash,
              "terminal_at": datetime.now(UTC).isoformat().replace("+00:00", "Z"),
              "prior_receipt_b64": os.environ.get("PRIOR_RECEIPT_B64", ""),
          }
          with open(sys.argv[1], "w", encoding="utf-8") as output:
              json.dump(value, output, sort_keys=True, separators=(",", ":"))
          PY

          python scripts/deploy_terminal_receipt.py \
              < "$RUNNER_TEMP/deploy-terminal-observation.json" \
              > "$RUNNER_TEMP/tinyassets-release-state.json"
          python - "$RUNNER_TEMP/tinyassets-release-state.json" \
              "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys
          receipt = json.load(open(sys.argv[1], encoding="utf-8"))
          if receipt["outcome"] == "deployed":
              terminal_canary = receipt["forward_canary_status"]
          elif receipt["outcome"] == "rolled_back" or receipt["rollback_attempted"]:
              terminal_canary = receipt["rollback_canary_status"]
          else:
              terminal_canary = receipt["forward_canary_status"]
          with open(sys.argv[2], "a", encoding="utf-8") as output:
              output.write(f"terminal_outcome={receipt['outcome']}\n")
              output.write(
                  "terminal_active_identity_status="
                  f"{receipt['active_identity_status']}\n"
              )
              output.write(f"terminal_canary_status={terminal_canary}\n")
              output.write(
                  "terminal_configured_image_ref="
                  f"{receipt['configured_image_ref']}\n"
              )
              output.write(
                  f"terminal_running_image_ref={receipt['running_image_ref']}\n"
              )
              output.write(
                  f"terminal_active_image_ref={receipt['active_image_ref']}\n"
              )
          PY

          remote_receipt="/tmp/tinyassets-release-state-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              "$RUNNER_TEMP/tinyassets-release-state.json" \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:${remote_receipt}"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -euo pipefail; \
               release_state_host_dir=\$(sudo docker volume inspect tinyassets-data --format '{{ .Mountpoint }}'); \
               next_receipt=\"\${release_state_host_dir}/release-state.json.next.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}\"; \
               sudo install -m 0644 -o 1001 -g 1001 '${remote_receipt}' \"\${next_receipt}\"; \
               sudo mv -f \"\${next_receipt}\" \"\${release_state_host_dir}/release-state.json\""
          echo "terminal_receipt_result=published" >> "$GITHUB_OUTPUT"
          {
            echo "### Terminal release-state receipt"
            echo ""
            echo "- Container path: \`/data/release-state.json\`"
            echo "- Outcome: \`$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))[\"outcome\"])' "$RUNNER_TEMP/tinyassets-release-state.json")\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${FORWARD_SUCCEEDED}" = "true" ]; then
            if ! python - "$RUNNER_TEMP/tinyassets-release-state.json" <<'PY'
          import json
          import sys

          receipt = json.load(open(sys.argv[1], encoding="utf-8"))
          proven = (
              receipt["outcome"] == "deployed"
              and receipt["active_identity_status"] == "agreed"
              and receipt["forward_canary_status"] == "passed"
          )
          raise SystemExit(0 if proven else 1)
          PY
            then
              echo "::error::forward terminal state is unproven after publication; keeping deploy red"
              exit 1
            fi
          fi

      - name: Open deploy-failed issue
        if: always() && failure()
        uses: actions/github-script@v7
        env:
          NEW_TAG: ${{ steps.tag.outputs.tag }}
          ATTEMPTED_IMAGE_REF: ${{ steps.tag.outputs.image_ref }}
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
          PRODUCTION_MUTATION_STARTED: ${{ steps.production_mutation.outputs.production_mutation_started }}
          IMAGE_MUTATION_STARTED: ${{ steps.deploy.outputs.image_mutation_started }}
          ROLLBACK_ATTEMPTED: ${{ steps.rollback.outputs.rollback_attempted }}
          ROLLBACK_RESULT: ${{ steps.rollback.outputs.rollback_result }}
          ROLLBACK_CANARY_STATUS: ${{ steps.rollback.outputs.rollback_canary_status }}
          ROLLBACK_REASON: ${{ steps.rollback.outputs.rollback_reason }}
          TERMINAL_RECEIPT_RESULT: ${{ steps.terminal.outputs.terminal_receipt_result }}
          TERMINAL_OUTCOME: ${{ steps.terminal.outputs.terminal_outcome }}
          TERMINAL_ACTIVE_IDENTITY_STATUS: ${{ steps.terminal.outputs.terminal_active_identity_status }}
          TERMINAL_CANARY_STATUS: ${{ steps.terminal.outputs.terminal_canary_status }}
          TERMINAL_CONFIGURED_IMAGE_REF: ${{ steps.terminal.outputs.terminal_configured_image_ref }}
          TERMINAL_RUNNING_IMAGE_REF: ${{ steps.terminal.outputs.terminal_running_image_ref }}
          TERMINAL_ACTIVE_IMAGE_REF: ${{ steps.terminal.outputs.terminal_active_image_ref }}
        with:
          script: |
            const label = "deploy-failed";
            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'fbca04',
                  description: 'CI production deploy failed; inspect terminal rollback evidence.',
                });
              } else {
                throw e;
              }
            }
            const productionMarker = process.env.PRODUCTION_MUTATION_STARTED || "";
            const imageMarker = process.env.IMAGE_MUTATION_STARTED || "";
            const rollbackAttemptedMarker = process.env.ROLLBACK_ATTEMPTED || "";
            const productionStarted = productionMarker === "true";
            const productionNotStarted = productionMarker === "" || productionMarker === "false";
            const imageStarted = imageMarker === "true";
            const imageNotStarted = imageMarker === "" || imageMarker === "false";
            const rollbackAttempted = rollbackAttemptedMarker === "true";
            const rollbackNotAttempted = rollbackAttemptedMarker === "false";
            const rollbackResult = process.env.ROLLBACK_RESULT || "";
            const rollbackCanary = process.env.ROLLBACK_CANARY_STATUS || "";
            const rollbackReason = process.env.ROLLBACK_REASON || "";
            const terminalResult = process.env.TERMINAL_RECEIPT_RESULT || "";
            const terminalOutcome = process.env.TERMINAL_OUTCOME || "";
            const terminalIdentity = process.env.TERMINAL_ACTIVE_IDENTITY_STATUS || "";
            const terminalCanary = process.env.TERMINAL_CANARY_STATUS || "";
            const previousImage = process.env.PREV_IMAGE || "";
            const canonicalRepoDigest = /^[a-z0-9]+(?:[._-][a-z0-9]+)*(?::[0-9]+)?(?:\/[a-z0-9]+(?:[._-][a-z0-9]+)*)+@sha256:[0-9a-f]{64}$/;

            let rollbackSentence;
            if (
              productionNotStarted
              && imageNotStarted
              && rollbackNotAttempted
              && rollbackResult === "not_attempted"
              && rollbackCanary === "not_run"
              && rollbackReason === "pre_host_write_failure"
            ) {
              rollbackSentence = "Production host write did not start; image rollback was not attempted.";
            } else if (
              productionStarted
              && imageNotStarted
              && rollbackNotAttempted
              && rollbackResult === "not_attempted"
              && rollbackCanary === "not_run"
              && rollbackReason === "image_mutation_not_started"
            ) {
              rollbackSentence = "Production mutation started, but image mutation did not; image rollback was not required.";
            } else if (
              productionStarted
              && imageStarted
              && rollbackNotAttempted
              && rollbackResult === "not_attempted"
              && rollbackCanary === "not_run"
              && rollbackReason === "not_needed"
            ) {
              if (
                terminalOutcome === "deployed"
                && terminalIdentity === "agreed"
                && terminalCanary === "passed"
              ) {
                rollbackSentence = "Rollback was not needed because terminal outcome is deployed, active image identity agrees, and the applicable canary passed.";
              } else {
                rollbackSentence = "Rollback was not attempted; forward production health is unproven.";
              }
            } else if (
              productionStarted
              && imageStarted
              && rollbackNotAttempted
              && rollbackResult === "not_attempted"
              && rollbackCanary === "not_run"
              && rollbackReason === "no_valid_target"
            ) {
              rollbackSentence = "Rollback was not attempted because no validated immutable previous image was available.";
            } else if (
              productionStarted
              && imageStarted
              && rollbackAttempted
              && rollbackResult === "succeeded"
              && rollbackCanary === "passed"
              && rollbackReason === "attempted"
            ) {
              if (
                terminalOutcome === "rolled_back"
                && terminalIdentity === "agreed"
                && canonicalRepoDigest.test(previousImage)
                && process.env.TERMINAL_ACTIVE_IMAGE_REF === previousImage
              ) {
                rollbackSentence = "Rollback succeeded and the rollback canary passed.";
              } else {
                rollbackSentence = "Rollback was not proven: the canary passed but configured and running image identity did not agree with the rollback target.";
              }
            } else if (
              productionStarted
              && imageStarted
              && rollbackAttempted
              && rollbackResult === "failed"
              && rollbackCanary === "failed"
              && rollbackReason === "attempted"
            ) {
              rollbackSentence = "Rollback failed; the rollback canary failed.";
            } else if (
              productionStarted
              && imageStarted
              && rollbackAttempted
              && rollbackResult === "failed"
              && rollbackCanary === "not_run"
              && rollbackReason === "attempted"
            ) {
              rollbackSentence = "Rollback failed before the rollback canary ran.";
            } else {
              rollbackSentence = "Rollback status is unavailable; rollback success was not proven.";
            }

            let receiptSentence;
            if (terminalResult === "published") {
              receiptSentence = "Terminal release-state receipt published.";
            } else if (terminalResult === "failed") {
              receiptSentence = "Terminal release-state publication failed; durable active-release truth is not proven and the prior receipt may be stale.";
            } else if (terminalResult === "not_applicable" && productionNotStarted) {
              receiptSentence = "Terminal release-state publication was not applicable; the prior receipt was left unchanged.";
            } else {
              receiptSentence = "Terminal release-state status is unavailable or inconsistent; durable active-release truth is not proven.";
            }

            let identitySentence;
            if (terminalIdentity === "agreed") {
              identitySentence = `Active image: \`${process.env.TERMINAL_ACTIVE_IMAGE_REF}\`.`;
            } else if (terminalIdentity === "mismatch") {
              identitySentence = `Active image mismatch: configured \`${process.env.TERMINAL_CONFIGURED_IMAGE_REF}\`, running \`${process.env.TERMINAL_RUNNING_IMAGE_REF}\`.`;
            } else if (terminalIdentity === "configured_unknown") {
              identitySentence = `Active image unproven: configured image observation is unavailable.`;
            } else if (terminalIdentity === "running_unknown") {
              identitySentence = `Active image unproven: running container observation is unavailable.`;
            } else {
              identitySentence = `Active image unproven: configured and running observations are unavailable or inconsistent.`;
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed — ${process.env.NEW_TAG} @ ${new Date().toISOString()}`,
              labels: [label],
              body: [
                `Auto-opened by the deploy-prod tinyassets.`,
                ``,
                `- Attempted: \`${process.env.NEW_TAG}\``,
                `- Attempted immutable ref: \`${process.env.ATTEMPTED_IMAGE_REF}\``,
                `- Rollback tuple: \`${process.env.ROLLBACK_ATTEMPTED}/${process.env.ROLLBACK_RESULT}/${process.env.ROLLBACK_CANARY_STATUS}/${process.env.ROLLBACK_REASON}\``,
                `- Run: ${runUrl}`,
                ``,
                rollbackSentence,
                receiptSentence,
                identitySentence,
                ``,
                `Check the run logs for the failing step and terminal evidence.`,
              ].join('\n'),
            });

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy result"
            echo ""
            echo "- **Target image:** \`${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}\`"
            echo "- **Previous image:** \`${{ steps.prev.outputs.previous }}\`"
            echo "- **Production mutation:** \`${{ steps.production_mutation.outputs.production_mutation_started }}\`"
            echo "- **Image mutation:** \`${{ steps.deploy.outputs.image_mutation_started }}\`"
            echo "- **Deploy step:** \`${{ steps.deploy.outcome }}\`"
            echo "- **Canary step:** \`${{ steps.canary.outcome }}\`"
            echo "- **Access gate step:** \`${{ steps.access-gate.outcome }}\`"
            echo "- **Rollback:** \`${{ steps.rollback.outputs.rollback_attempted }}/${{ steps.rollback.outputs.rollback_result }}/${{ steps.rollback.outputs.rollback_canary_status }}/${{ steps.rollback.outputs.rollback_reason }}\`"
            echo "- **Terminal receipt:** \`${{ steps.terminal.outputs.terminal_receipt_result }}\`"
            echo "- **Terminal outcome:** \`${{ steps.terminal.outputs.terminal_outcome }}\`"
            echo "- **Terminal active identity:** \`${{ steps.terminal.outputs.terminal_active_identity_status }}\`"
            echo "- **Overall:** \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
