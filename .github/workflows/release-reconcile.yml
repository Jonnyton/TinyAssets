name: Release reconcile

# Why this exists
# ---------------
# Three times in one day the release chain broke silently, and each break was
# only found by checking production by hand:
#
#   1. Merges performed by the Actions app via GITHUB_TOKEN do not trigger
#      workflow runs, so the push to main built nothing. Five PRs shipped
#      nowhere, including a storage fix for universes that lost their database.
#   2. `strict` required checks left every other enrolled PR `behind` after each
#      merge, so nothing could land while main kept moving.
#   3. post-merge-release.yml tried to fix (1) by dispatching on
#      `pull_request_target: closed`. It never fired once — `closed` is also
#      suppressed when the token performed the merge. It has been deleted
#      rather than left in place looking like a safety net.
#
# Every link in an event chain fails silently and independently. So this does
# not react to an event. It asks one question on a timer — IS PRODUCTION
# RUNNING CURRENT MAIN? — and converges. `schedule` is driven by GitHub itself
# rather than by any token, so nothing can suppress it. A broken chain stays
# broken; a loop heals.
#
# What "production" means here
# ----------------------------
# The first version of this file asked whether a successful IMAGE BUILD existed
# for the current commit. A cross-family review pointed out that this is not the
# same question at all, and it can report "in sync" while production is stale:
#
#   - the build succeeded but the deploy or canary failed
#   - the deploy succeeded and then AUTO-ROLLED BACK on canary red
#   - a successful build on a FEATURE BRANCH happened to contain the commit —
#     the build-runs query was never filtered to main, and there is in fact one
#     such run in this repo's history, so this was live and not theoretical
#
# So the question is now asked of `Deploy prod` runs on main, which only reach
# success after the post-deploy canary passes. That is the closest signal to
# "production is actually serving this commit" available from the API.
#
# Why this dispatches the deploy itself
# -------------------------------------
# The first version dispatched `build-image.yml` and stated that `Deploy prod`
# would chain from it. It does not. `Deploy prod` triggers on `workflow_run`, and
# a run that was DISPATCHED by GITHUB_TOKEN cannot itself trigger further runs —
# the same suppression rule that killed post-merge-release.yml, one level deeper.
# So this file was reproducing the exact failure it was written to escape: it
# dispatched a build every tick, the build went green, nothing deployed, and the
# next tick saw the same drift and dispatched another build. A loop that cannot
# reach its own goal state is not a loop, it is a spinner.
#
# Measured on 2026-07-22, a clean natural experiment:
#   - 05:28Z build triggered by a real `push`      -> deploy fired 05:31Z
#   - 04:33Z and 06:53Z builds dispatched by token -> no deploy, ever
# In the gap, a credential fail-closed security fix sat on main, built, undeployed.
#
# `workflow_dispatch` is one of the two events GITHUB_TOKEN may still raise, so
# convergence is done by dispatching BOTH steps explicitly rather than by trusting
# a cascade. That makes this a two-state machine, and it settles in two ticks:
#
#   no image for main HEAD   -> dispatch build   (tick 1)
#   image but no deploy      -> dispatch deploy  (tick 2)
#   deploy contains the work -> nothing
#
# Deploy is dispatched on `main`, and `Deploy prod` resolves its image by the sha
# of the ref it runs on — so the build must exist for main's CURRENT HEAD, not
# merely for the last release-relevant commit. It refuses a mutable-tag fallback
# when that image is missing (verified: it failed closed on exactly this, rather
# than silently shipping a stale image), which is why the build state is checked
# against HEAD.

on:
  schedule:
    # Every 15 minutes. A check costs two API calls; not checking cost us a
    # storage data-loss fix sitting unshipped on main.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: release-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    name: Is prod running current main?
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Needed to ask "which commit last touched a release path" and to test
          # ancestry against what was deployed.
          fetch-depth: 0

      - name: Compare main against the last successful deploy
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -uo pipefail

          # Release-relevant paths are READ from build-image.yml, never copied.
          # A duplicated filter drifts silently toward "never deploys", which is
          # the failure this whole file exists to catch.
          #
          # No `pip install` here: this job holds `actions: write`, and pulling
          # an unpinned package into a privileged job to parse a local YAML file
          # is a supply-chain risk taken for no reason. The parse below is a
          # small hand-rolled reader of the one block we care about.
          PATHS="$(python3 - <<'PY'
          import re

          # Pull the `paths:` list out of build-image.yml's push trigger. The
          # file is ours and its shape is stable; if this ever stops matching we
          # fall through to "treat everything as release-relevant", which errs
          # toward deploying rather than toward silence.
          try:
              text = open(".github/workflows/build-image.yml", encoding="utf-8").read()
          except OSError:
              raise SystemExit(0)

          block = re.search(r"\n\s*paths:\s*\n((?:\s*-\s*.+\n)+)", text)
          if not block:
              raise SystemExit(0)
          for line in block.group(1).splitlines():
              item = line.strip().lstrip("-").strip().strip("'\"")
              if item:
                  print(item)
          PY
          )"

          if [ -z "$PATHS" ]; then
            echo "could not read build-image paths — treating HEAD as release-relevant"
            RELEVANT="$(git rev-parse HEAD)"
          else
            echo "release paths:"; printf '%s\n' "$PATHS" | sed 's/^/  /'
            # Newest commit on main touching anything the image is built from.
            # Docs-only commits after it genuinely need no deploy.
            # shellcheck disable=SC2086
            RELEVANT="$(git log -1 --format=%H -- $PATHS)"
          fi

          if [ -z "$RELEVANT" ]; then
            echo "action=none" >> "$GITHUB_OUTPUT"
            echo "detail=no release-relevant history" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "main HEAD             : $(git rev-parse HEAD)"
          echo "last release-relevant : ${RELEVANT}"

          # Successful DEPLOY runs on main — not builds. A deploy only reaches
          # success after its post-deploy canary passes, so this is the closest
          # available proxy for "production is serving this". Filtered to main
          # so a feature-branch run can never be mistaken for production.
          DEPLOYED="$(gh api --paginate \
                       "repos/${REPO}/actions/workflows/deploy-prod.yml/runs?status=success&branch=main&per_page=100" \
                       --jq '.workflow_runs[].head_sha' 2>/dev/null || true)"

          # No early exit when DEPLOYED is empty. The ancestry loop below simply
          # does not execute, and control reaches the same build-vs-deploy
          # decision — which is the right answer for "nothing has ever deployed"
          # too. An early exit here used to emit its own action value, and when
          # the action vocabulary grew from one verb to two it would have become
          # a value nothing matched: a silent no-op that looks like a healthy run.
          if [ -z "$DEPLOYED" ]; then
            echo "no successful deploy to main on record"
          fi

          # Ancestry, not equality: a deploy of a later commit already contains
          # this one, and docs commits landing in between must not make us look
          # stale forever.
          for sha in $DEPLOYED; do
            # A sha from a deleted branch may no longer be reachable locally;
            # cat-file guards merge-base against erroring on an unknown object.
            git cat-file -e "${sha}^{commit}" 2>/dev/null || continue
            if git merge-base --is-ancestor "$RELEVANT" "$sha" 2>/dev/null; then
              echo "in sync — deploy ${sha:0:8} contains ${RELEVANT:0:8}"
              echo "action=none" >> "$GITHUB_OUTPUT"
              echo "detail=deploy ${sha:0:8} contains ${RELEVANT:0:8}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "DRIFT: nothing deployed contains ${RELEVANT:0:8}"

          # Production is stale. Which of the two steps is missing?
          #
          # `Deploy prod` resolves its image by the sha of the ref it runs on, so
          # the question is whether an image exists for main's CURRENT HEAD — not
          # for RELEVANT. A docs commit landing after the last code commit still
          # moves HEAD, and the deploy will look for HEAD's tag and fail closed if
          # it was never built.
          HEAD_SHA="$(git rev-parse HEAD)"
          BUILT="$(gh api --paginate \
                     "repos/${REPO}/actions/workflows/build-image.yml/runs?status=success&branch=main&per_page=100" \
                     --jq '.workflow_runs[].head_sha' 2>/dev/null || true)"

          if printf '%s\n' "$BUILT" | grep -qx "$HEAD_SHA"; then
            echo "image exists for ${HEAD_SHA:0:8} — deploy is the missing step"
            echo "action=deploy" >> "$GITHUB_OUTPUT"
            echo "detail=image ${HEAD_SHA:0:8} built but no successful deploy contains ${RELEVANT:0:8}" >> "$GITHUB_OUTPUT"
          else
            echo "no successful build for ${HEAD_SHA:0:8} — build is the missing step"
            echo "action=build" >> "$GITHUB_OUTPUT"
            echo "detail=no image built for ${HEAD_SHA:0:8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the missing image
        if: steps.check.outputs.action == 'build'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DETAIL: ${{ steps.check.outputs.detail }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run build-image.yml --repo "$REPO" --ref main
          {
            echo "### Release drift — building"
            echo ""
            echo "${DETAIL}."
            echo ""
            echo "Dispatched \`Build and publish image\`. This does NOT chain to a"
            echo "deploy — a token-dispatched run cannot trigger one. The next tick"
            echo "sees the image and dispatches \`Deploy prod\` itself."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy the built image
        if: steps.check.outputs.action == 'deploy'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DETAIL: ${{ steps.check.outputs.detail }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run deploy-prod.yml --repo "$REPO" --ref main
          {
            echo "### Release drift — deploying"
            echo ""
            echo "${DETAIL}."
            echo ""
            echo "Dispatched \`Deploy prod\` directly. It reaches success only after"
            echo "its post-deploy canary passes, so the next tick reads that result"
            echo "as the answer to whether production actually converged."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: In sync
        if: steps.check.outputs.action == 'none'
        env:
          DETAIL: ${{ steps.check.outputs.detail }}
        shell: bash
        run: echo "Production is current with main — ${DETAIL}." >> "$GITHUB_STEP_SUMMARY"

# On the 15-minute interval
# -------------------------
# This is now the ONLY thing that starts a release, so the interval is the
# expected latency rather than a worst case. Fifteen minutes was chosen because
# "merged but not shipped" must not survive long enough to be mistaken for
# shipped — which is exactly what happened when it survived for hours.
