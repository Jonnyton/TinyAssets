# Deploy WebSite/site (SvelteKit static) to GitHub Pages.
# Triggers: push to main (touching site files), workflow_dispatch, daily cron.
# Custom domain: tinyassets.io (via static/CNAME). Cloudflare fronts.
name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - 'WebSite/site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:
    inputs:
      refresh_snapshot:
        description: 'Force re-bake the MCP snapshot before build (also runs automatically on the 6h cron)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    # Every 6h: re-bake the MCP snapshot (reads are public, no secret needed),
    # then redeploy — so /graph and /commons auto-refresh with zero intervention.
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WebSite/site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: WebSite/site/package-lock.json

      - name: Install
        run: npm ci

      # Re-bake the snapshot on the 6h cron AND on manual dispatch with the toggle.
      # CI always does a COMPLETE (full) bake — SNAPSHOT_FULL=1 — so the live snapshot
      # is always complete and never accumulates incremental-merge drift. (~20-30 min,
      # fine for CI; reads are public so it needs no secret.) Local `npm run snapshot`
      # defaults to FAST incremental for dev iteration.
      - name: Refresh MCP snapshot (full)
        if: github.event_name == 'schedule' || github.event.inputs.refresh_snapshot == 'true'
        env:
          MCP_BEARER: ${{ secrets.MCP_BEARER }}
          SNAPSHOT_FULL: '1'
        run: npm run snapshot

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: WebSite/site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
