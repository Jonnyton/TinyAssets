name: Community loop watch

# Cloud-side status/alarm for retained uptime surfaces after the 2026-06-25
# cheat-loop retirement. This keeps MCP canary, Tier-3 clone, deploy-lane, and
# P0 outage monitoring on GitHub infrastructure so the signal survives the local
# development machine being off.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      self_heal_followup:
        description: Internal self-heal follow-up pass after dependency dispatch.
        required: false
        default: "false"
  workflow_run:
    workflows: ["Uptime canary", "tier3-oss-clone-nightly", "deploy-site", "Deploy prod"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "scripts/community_loop_watch.py"
      - ".github/workflows/community-loop-watch.yml"

permissions:
  contents: read
  issues: write
  actions: write

concurrency:
  group: community-loop-watch
  cancel-in-progress: false

env:
  ALARM_ISSUE_LABEL: community-loop-red

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      overall: ${{ steps.watch.outputs.overall }}
      status: ${{ steps.watch.outputs.status }}
      msg: ${{ steps.watch.outputs.msg }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run community loop watch
        id: watch
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python scripts/community_loop_watch.py --json > community-loop-status.json 2>&1
          code=$?
          set -e

          cat community-loop-status.json
          overall=$(python - <<'PY'
          import json
          with open("community-loop-status.json", encoding="utf-8") as f:
              print(json.load(f).get("overall", "red"))
          PY
          )

          sed -n '1,240p' community-loop-status.json
          _delim="EOF_$(tr -d '-' < /proc/sys/kernel/random/uuid)"
          {
            echo "status=$code"
            echo "overall=$overall"
            echo "msg<<${_delim}"
            cat community-loop-status.json
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"

          if [ "$overall" = "red" ]; then
            exit "$code"
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "### Community loop watch"
            echo ""
            echo "- **overall**: ${{ steps.watch.outputs.overall }}"
            echo "- **exit**: ${{ steps.watch.outputs.status }}"
            echo ""
            echo '<details><summary>status JSON</summary>'
            echo ""
            echo '```json'
            cat community-loop-status.json
            echo '```'
            echo ""
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when retained uptime surface is red
        if: steps.watch.outputs.overall == 'red'
        run: |
          exit 2

  alarm-sink:
    needs: watch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Manage community-loop-red issue
        uses: actions/github-script@v7
        env:
          OVERALL: ${{ needs.watch.outputs.overall }}
          PROBE_STATUS: ${{ needs.watch.outputs.status }}
          PROBE_MSG: ${{ needs.watch.outputs.msg }}
          LABEL: ${{ env.ALARM_ISSUE_LABEL }}
        with:
          script: |
            const overall = process.env.OVERALL || 'red';
            const label = process.env.LABEL;
            const probeStatus = process.env.PROBE_STATUS || '(unknown)';
            const probeMsg = process.env.PROBE_MSG || '';
            const now = new Date().toISOString();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const staleDispatchable = new Set(['uptime-canary.yml']);
            const isSelfHealFollowup = context.payload.inputs?.self_heal_followup === 'true';
            const retryDelaysMs = [1000, 3000, 7000];

            function githubStatus(error) {
              return Number(error?.status || error?.response?.status || 0);
            }

            function isRetryableGitHubError(error) {
              const status = githubStatus(error);
              return status === 408 || status === 409 || status === 425 || status === 429 || status >= 500;
            }

            async function githubCall(description, call, {required = false} = {}) {
              for (let attempt = 0; attempt <= retryDelaysMs.length; attempt += 1) {
                try {
                  return await call();
                } catch (error) {
                  const status = githubStatus(error);
                  if (isRetryableGitHubError(error) && attempt < retryDelaysMs.length) {
                    core.warning(
                      `${description} failed with status ${status || 'unknown'}; retrying: ${error.message || error}`,
                    );
                    await new Promise((resolve) => setTimeout(resolve, retryDelaysMs[attempt]));
                    continue;
                  }

                  if (required) {
                    throw error;
                  }

                  const suffix = status ? ` with status ${status}` : '';
                  core.warning(`${description} failed${suffix}: ${error.message || error}`);
                  return null;
                }
              }

              return null;
            }

            async function dispatchStaleDependencies() {
              let status;
              try {
                status = JSON.parse(probeMsg);
              } catch (error) {
                core.warning(`Could not parse status JSON for self-heal dispatch: ${error.message}`);
                return false;
              }

              const stages = Array.isArray(status.stages) ? status.stages : [];
              let dispatched = false;
              for (const stage of stages) {
                const workflowId = stage?.details?.workflow_id;
                const summary = String(stage?.summary || '');
                if (
                  stage?.status === 'red' &&
                  staleDispatchable.has(workflowId) &&
                  summary.includes('has not run successfully')
                ) {
                  try {
                    await github.rest.actions.createWorkflowDispatch({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      workflow_id: workflowId,
                      ref: 'main',
                    });
                    console.log(`dispatched stale dependency workflow ${workflowId}`);
                    dispatched = true;
                  } catch (error) {
                    core.warning(`Could not dispatch stale dependency workflow ${workflowId}: ${error.message}`);
                  }
                }
              }
              return dispatched;
            }

            const dispatchedSelfHeal = await dispatchStaleDependencies();
            if (dispatchedSelfHeal && !isSelfHealFollowup) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'community-loop-watch.yml',
                  ref: 'main',
                  inputs: { self_heal_followup: 'true' },
                });
                console.log('dispatched community-loop-watch.yml self-heal follow-up');
              } catch (error) {
                core.warning(`Could not dispatch community-loop-watch.yml self-heal follow-up: ${error.message}`);
              }
            }

            try {
              await githubCall('lookup alarm label', () => github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              }), {required: true});
            } catch (e) {
              if (e.status === 404) {
                await githubCall('create alarm label', () => github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Auto-opened when a retained uptime or deploy surface is red.',
                }));
              } else {
                core.warning(`Could not confirm alarm label ${label}: ${e.message || e}`);
                return;
              }
            }

            const openIssues = await githubCall('list open alarm issues', () => github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 5,
            }));
            if (!openIssues) {
              return;
            }

            const title = 'Community loop watch red';
            const body = [
              `Community loop watch is **${overall.toUpperCase()}** as of ${now}.`,
              '',
              `Run: ${runUrl}`,
              `Probe exit: ${probeStatus}`,
              '',
              '```json',
              probeMsg.slice(0, 60000),
              '```',
            ].join('\n');

            if (overall === 'red') {
              const existing = openIssues.data.find((issue) => issue.title === title);
              if (existing) {
                await githubCall('append RED alarm comment', () => github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                }));
              } else {
                await githubCall('open RED alarm issue', () => github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: [label],
                }));
              }
              return;
            }

            for (const issue of openIssues.data) {
              await githubCall('append recovered alarm comment', () => github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Recovered at ${now}. Latest run: ${runUrl}`,
              }));
              await githubCall('close recovered alarm issue', () => github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              }));
              console.log(`closed recovered alarm issue #${issue.number}`);
            }
