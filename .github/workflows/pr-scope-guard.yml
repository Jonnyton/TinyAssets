name: PR scope guard

# Why this exists
# ---------------
# Green checks are not sufficient to auto-merge safely. PR #1491 presented as a
# two-file auth fix and CI was happy — but its diff against main carried seven
# workflow files plus deploy-prod.yml and Dockerfile, because the branch sat on
# an unmerged 217-commit lineage. Nothing in CI objected; only inspecting the
# DIFF SCOPE caught it. With auto-merge enabled, that PR would have shipped
# changes to the production deploy workflow under the banner of an auth fix.
#
# So: a PR that touches release-critical infrastructure must say so explicitly,
# via the `infra-change` label. This is a scope-declaration gate, not a security
# control — see the honesty note at the bottom of this file.
#
# MUST run unconditionally (no `paths:` filter). A required status check that is
# path-filtered never reports on PRs outside those paths, and the PR then hangs
# forever on "Expected — waiting for status". `lint`/actionlint is path-filtered
# for exactly this reason and must NOT be added as a required check.

on:
  # pull_request_target: this workflow is always the TRUSTED copy from the default
  # branch. With plain `pull_request`, a PR could edit the very workflow that
  # judges it — the guard would grade its own homework. We never check out or
  # execute PR code here, so using _target is safe: we only read metadata.
  pull_request_target:
    # `labeled`/`unlabeled` matter: declaring an infra change must re-run the gate.
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-scope-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scope:
    name: Diff scope declared
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Deliberately NO actions/checkout: under pull_request_target a checkout of
      # the PR head would execute untrusted code with a privileged token. The file
      # list comes from the API instead.
      - name: Compare the PR diff against release-critical paths
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        shell: bash
        run: |
          set -euo pipefail

          # Release-critical: anything that can change how the product is built,
          # deployed, or what runs in production.
          #
          # packaging/ is deliberately EXCLUDED. The plugin mirror there is a
          # GENERATED artifact that legitimately changes with most canonical
          # tinyassets/* PRs, and it already has its own parity check. Including it
          # flagged 4 of 5 sampled real PRs, which would have trained everyone to
          # rubber-stamp the infra-change label and defeated the guard.
          # scripts/ci_required_tests.py and .github/known-failing-tests.txt are
          # here because they ARE the `required-tests` gate. That gate runs from
          # the PR's own checkout (it must — it executes the PR's code), so a PR
          # can rewrite the thing judging it while keeping the check name green.
          # Workflow files were already covered; without these two entries the
          # same neutering could be done one directory over, undeclared.
          SENSITIVE_RE='^(\.github/workflows/|\.github/known-failing-tests\.txt$|scripts/ci_required_tests\.py$|deploy/|Dockerfile$|\.dockerignore$)'

          # Paginated API read. Fail CLOSED on error — a guard that silently
          # sees fewer files than the PR contains is worse than none.
          if ! CHANGED="$(gh api --paginate "repos/${REPO}/pulls/${PR}/files"                             --jq '.[].filename' 2>/dev/null)"; then
            echo "::error::could not read the PR file list — failing closed"
            exit 1
          fi

          TOTAL="$(printf '%s\n' "$CHANGED" | sed '/^$/d' | wc -l | tr -d ' ')"

          # The endpoint caps at 3000 files and says nothing when it truncates.
          # An earlier version of this comment claimed the read above already
          # failed closed on truncation; it did not, and a cross-family review
          # caught the false assurance. At the cap we cannot know whether the
          # unseen files are release-critical, so refuse rather than guess —
          # a diff that large needs splitting regardless.
          API_FILE_CAP=3000
          if [ "$TOTAL" -ge "$API_FILE_CAP" ]; then
            echo "::error::PR file list hit the ${API_FILE_CAP}-file API cap — the diff cannot be fully inspected"
            {
              echo "### PR scope guard"
              echo ""
              echo "**Blocked — diff exceeds what the API will report.** ${TOTAL} files;"
              echo "the endpoint caps at ${API_FILE_CAP} and does not report truncation, so"
              echo "release-critical files could be present and invisible to this check."
              echo ""
              echo "Split the PR, or rebase it if it is carrying an unmerged lineage."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          HITS="$(printf '%s\n' "$CHANGED" | grep -E "$SENSITIVE_RE" || true)"
          HIT_COUNT="$(printf '%s\n' "$HITS" | sed '/^$/d' | wc -l | tr -d ' ')"

          echo "### PR scope guard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Files changed vs merge-base: **${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Release-critical files touched: **${HIT_COUNT}**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$HIT_COUNT" -eq 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No release-critical paths touched." >> "$GITHUB_STEP_SUMMARY"
            echo "scope guard: clean (${TOTAL} files, none release-critical)"
            exit 0
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Release-critical files</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # shellcheck disable=SC2016  # the $ is sed's end-of-line anchor, not a variable
          printf '%s\n' "$HITS" | sed 's/^/- `/; s/$/`/' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          # HARD CAPS — no label bypasses these. A label is a declaration of intent,
          # not authorization: it can be applied by any writer, is not bound to a head
          # SHA, and goes stale the moment someone pushes again. PR #1491 is the case
          # that proves it — 386 changed files and 16 release-critical, which a bare
          # label would have waved straight through into auto-merge.
          # The RISK is release-critical breadth, not raw size. #1491 was dangerous
          # because it carried 16 release-critical files while claiming to be a
          # two-file auth fix — not merely because it was large. So:
          #
          #   MAX_SENSITIVE is a HARD cap. No label clears it. Past this, a branch
          #   is almost certainly dragging an unmerged lineage and must be rebased.
          #
          #   Total size is only a PROXY for that bloat, so it is declarable. PR
          #   #1490 proved the difference: a legitimate 166-file recovery touching
          #   ONE workflow was blocked by a size cap it had no way to satisfy, while
          #   posing none of the risk the cap exists to catch.
          MAX_SENSITIVE=8
          if [ "$HIT_COUNT" -gt "$MAX_SENSITIVE" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Blocked — beyond the label's authority.** ${HIT_COUNT} release-critical files (hard cap ${MAX_SENSITIVE})." >> "$GITHUB_STEP_SUMMARY"
            echo "A branch touching this many release-critical files is almost certainly" >> "$GITHUB_STEP_SUMMARY"
            echo "carrying an unmerged lineage. Rebase onto the target branch, or split it." >> "$GITHUB_STEP_SUMMARY"
            echo "The \`infra-change\` label cannot clear this." >> "$GITHUB_STEP_SUMMARY"
            echo "scope guard: BLOCKED — ${HIT_COUNT} release-critical files exceeds hard cap ${MAX_SENSITIVE}"
            exit 1
          fi

          LARGE_TOTAL=150
          if [ "$TOTAL" -gt "$LARGE_TOTAL" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Note: ${TOTAL} files changed (advisory threshold ${LARGE_TOTAL}) with only ${HIT_COUNT} release-critical." >> "$GITHUB_STEP_SUMMARY"
            echo "Large but narrow — allowed when declared." >> "$GITHUB_STEP_SUMMARY"
          fi

          case ",${LABELS}," in
            *,infra-change,*)
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Declared via the \`infra-change\` label — allowed." >> "$GITHUB_STEP_SUMMARY"
              echo "scope guard: ${HIT_COUNT} release-critical file(s), declared by label"
              exit 0
              ;;
          esac

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Blocked.** This PR changes release-critical files without declaring it." >> "$GITHUB_STEP_SUMMARY"
          echo "If the change is intended, add the \`infra-change\` label." >> "$GITHUB_STEP_SUMMARY"
          echo "If it is NOT intended, the branch is probably carrying an unmerged" >> "$GITHUB_STEP_SUMMARY"
          echo "lineage — rebase onto the target branch so the diff shows only your work." >> "$GITHUB_STEP_SUMMARY"

          printf '%s\n' "$HITS" | while IFS= read -r f; do
            [ -n "$f" ] && echo "::error file=${f}::release-critical path changed without the infra-change label"
          done

          echo "scope guard: BLOCKED — ${HIT_COUNT} release-critical file(s), no infra-change label"
          exit 1

# Honesty note
# ------------
# A label-based exemption is only as strong as whoever applies the label, so this
# does NOT stop a determined actor — it is not a security boundary. What it does
# stop is the failure that actually happened: infrastructure changing SILENTLY,
# as a side effect of a branch's history, while the PR title and CI both say
# something narrower. It converts an invisible diff into a deliberate one.
