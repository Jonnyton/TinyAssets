name: Tests

# Why this exists
# ---------------
# Until this workflow landed, NEITHER required status check on `main` tested code
# behaviour:
#
#   * `policy` (daemon-request-policy.yml) only reads writer:/checker: labels. A
#     PR carrying none of them passes it trivially.
#   * `Diff scope declared` (pr-scope-guard.yml) is a scope-DECLARATION gate and
#     says so in its own honesty note.
#
# Since the repo auto-merges any non-draft PR once required checks pass, and
# merges flow on to production, code could reach live users without a single
# behavioural gate. This workflow is that gate.
#
# MUST run unconditionally — no `paths:` filter, no job-level `if:`.
# A REQUIRED status check that is path-filtered never reports at all on PRs
# outside those paths, and the PR then hangs forever on "Expected — waiting for
# status". That is why `lint`/actionlint is path-filtered and must NEVER be made
# required. Every `exit` path below produces a conclusion for the same check name.

on:
  pull_request:
    # No `paths:` — see above. Drafts get `opened`/`synchronize` too, so the gate
    # gives signal before a PR is marked ready and becomes auto-merge eligible.
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

# `pull_request`, deliberately NOT `pull_request_target`: testing a PR means
# EXECUTING the PR's code, so it must run in the untrusted-by-default context
# where the token is read-only and secrets are withheld. The scope guard uses
# _target for the opposite reason — it only reads metadata and must not be
# editable by the PR it judges.
permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  required-tests:
    # This exact string is the branch-protection context. Renaming the job
    # silently detaches the requirement and every PR goes green on nothing —
    # change it only together with the `gh api` update in
    # docs/decisions/ADR-003-required-test-aggregator.md.
    name: required-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run the required test surface
        env:
          # Keep the suite off the real repo tree and off any host state. The
          # conftest already forces mock providers and sqlite_only storage; this
          # is belt-and-braces for anything that reads the env directly.
          TINYASSETS_DATA_DIR: ${{ runner.temp }}/ta-data
        run: |
          mkdir -p "$TINYASSETS_DATA_DIR"
          # The script owns the pytest invocation AND the pass/fail decision:
          # it fails on any failure not listed in .github/known-failing-tests.txt.
          # No `|| true`, no `continue-on-error` — its exit code IS the gate.
          python scripts/ci_required_tests.py --junit junit.xml

      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-required-tests
          path: junit.xml
          if-no-files-found: warn

  # NOT a required check (yet). The repo's `slow` marker guards stress/race
  # tests, and `required-tests` deselects them to stay fast — which left the 9
  # concurrency tests in test_activity_log_parity.py and test_node_bid_claim_stress.py
  # with NO CI runner at all, against an AGENTS.md rule that uptime work ships
  # with a concurrency/load proof. This job gives them one. It is reported but
  # not required until it has a clean track record, because stress tests are the
  # likeliest source of flake and a flaky REQUIRED check trains people to
  # re-run until green — which is how a gate stops meaning anything.
  slow-tests:
    name: slow-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run slow/stress/race tests
        env:
          TINYASSETS_DATA_DIR: ${{ runner.temp }}/ta-data-slow
        run: |
          mkdir -p "$TINYASSETS_DATA_DIR"
          # Serial on purpose: these assert cross-process/locking behaviour and
          # sharing a worker pool with them would test the pool, not the code.
          pytest -m slow -q --no-header -rfE --durations=10
