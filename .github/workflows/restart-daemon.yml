name: Restart daemon

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for the manual restart'
        required: false
        type: string
      install_watchdog:
        description: 'Converge all host uptime services before restart'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: restart-daemon
  cancel-in-progress: false

env:
  DO_DROPLET_HOST: ${{ secrets.DO_DROPLET_HOST }}
  DO_SSH_USER: ${{ secrets.DO_SSH_USER }}
  CANARY_URL: https://tinyassets.io/mcp

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify secrets present
        run: |
          missing=()
          [ -z "$DO_DROPLET_HOST" ] && missing+=("DO_DROPLET_HOST")
          [ -z "$DO_SSH_USER" ] && missing+=("DO_SSH_USER")
          [ -z "${{ secrets.DO_SSH_KEY }}" ] && missing+=("DO_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/do_deploy
          chmod 600 ~/.ssh/do_deploy
          ssh-keyscan -t ed25519,rsa "$DO_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Converge host uptime services
        if: inputs.install_watchdog == true
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          [[ "${source_sha}" == "${GITHUB_SHA}" ]]
          mapfile -t uptime_files < <(
            TINYASSETS_PRINT_MANIFEST=1 \
              bash deploy/install-host-uptime-services.sh
          )
          bundle="/tmp/tinyassets-host-uptime-${source_sha}.tar.gz"
          checksum="${bundle}.sha256"
          git archive --format=tar HEAD -- "${uptime_files[@]}" \
              | gzip -n > "${bundle}"
          (
            cd /tmp
            sha256sum "$(basename "${bundle}")" > "$(basename "${checksum}")"
          )

          remote_stage="$(
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "mktemp -d /tmp/tinyassets-host-uptime.XXXXXX"
          )"
          [[ "${remote_stage}" =~ ^/tmp/tinyassets-host-uptime[.][A-Za-z0-9]+$ ]]
          cleanup() {
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "rm -rf -- '${remote_stage}'" || true
          }
          trap cleanup EXIT
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${bundle}" "${checksum}" \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:${remote_stage}/"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "bash -se -- $(printf '%q' "${remote_stage}") $(printf '%q' "${source_sha}") $(printf '%q' "$(basename "${bundle}")") $(printf '%q' "$(basename "${checksum}")")" <<'REMOTE'
          set -euo pipefail
          remote_stage="$1"
          source_sha="$2"
          bundle_name="$3"
          checksum_name="$4"
          cd "${remote_stage}"
          sha256sum -c "${checksum_name}"
          mkdir source
          tar -xzf "${bundle_name}" -C source
          sudo env TINYASSETS_SOURCE_ROOT="${remote_stage}/source" \
              TINYASSETS_SOURCE_SHA="${source_sha}" \
              bash "${remote_stage}/source/deploy/install-host-uptime-services.sh"
          REMOTE

      - name: Restart workflow daemon
        run: |
          echo "Restart reason: ${{ inputs.reason }}"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; sudo systemctl reset-failed tinyassets-daemon.service || true; sudo systemctl restart tinyassets-daemon.service"

      - name: Wait for public canary
        run: |
          for i in $(seq 1 24); do
            if python scripts/mcp_public_canary.py --url "$CANARY_URL" --timeout 10 >/dev/null 2>&1; then
              echo "canary green after ${i} poll(s)"
              exit 0
            fi
            sleep 5
          done
          python scripts/mcp_public_canary.py --url "$CANARY_URL" --timeout 10 --verbose
