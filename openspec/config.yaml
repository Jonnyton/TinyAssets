schema: spec-driven

# Project context — shown to AI when creating artifacts.
context: |
  TinyAssets (formerly "Workflow"; the code rename to the `tinyassets/`
  package is complete): a goal-agnostic daemon engine + democratized
  production commons. Python 3.11+ backend (`tinyassets/` package,
  `fantasy_daemon/` runtime entry), SvelteKit site (WebSite/site/), live
  MCP connector at https://tinyassets.io/mcp advertising the canonical
  handle set read_graph/write_graph/run_graph/read_page/write_page/converse
  plus get_status (authoritative spec:
  openspec/specs/live-mcp-connector-surface/spec.md).

  As-built capability truth lives in openspec/specs/ (baseline change
  `spec-out-existing-platform`, 2026-07-19); check there before drafting
  requirements. Conventions that constrain every change:
  - AGENTS.md owns process truth, PLAN.md owns design truth, STATUS.md owns
    live-state truth. openspec/specs/ owns per-capability behavioral
    requirements (as-built).
  - Hard rules (AGENTS.md): SqliteSaver only; LanceDB singleton; no API SDKs
    for the primary writer (claude -p / codex exec subprocesses);
    fail loudly, never silently; no shims/migrations/compat aliases —
    replace bad shapes at the boundary; TypedDict + Annotated reducers;
    autonomous defaults for executable gates.
  - Public-surface changes require post-change canary probes
    (scripts/mcp_public_canary.py) and rendered-chatbot ui-test proof.
  - Multi-provider repo: Claude Code, Codex, Cursor, Cowork, Kimi all work
    here concurrently; STATUS.md Work table is the claim surface.
  - pytest + ruff gate commits; every module has tests.

rules:
  proposal:
    - Always include capability names in kebab-case; check openspec/specs/ for existing capabilities before adding new ones.
  specs:
    - Requirements use SHALL language, with SHALL/MUST in the first line of each requirement body; every requirement has at least one "#### Scenario:" block.
    - Ground requirements in actual as-built behavior (cite the owning module in prose when helpful); do not spec aspirations.
  tasks:
    - Order tasks by dependency; each task is landable and verifiable on its own.
